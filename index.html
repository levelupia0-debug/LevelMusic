<style>
    :root {
        --bg-base: #020617; 
        --accent-1: #3B82F6; 
        --text-main: #FFFFFF;
    }
    
    * { 
        scrollbar-width: none; 
        -ms-overflow-style: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
    }
    ::-webkit-scrollbar { display: none; }
    
    body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-base);
        color: var(--text-main);
        margin: 0;
        overflow: hidden;
    }

    .bg-orbs {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(circle at 50% 0%, #061022 0%, var(--bg-base) 100%);
    }

    .row-scroll {
        display: flex;
        overflow-x: auto;
        gap: 12px;
        padding-bottom: 20px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
    }
    .row-item {
        scroll-snap-align: start;
        flex: 0 0 auto;
    }
    
    .header-blur {
        background: rgba(2, 6, 23, 0.85);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .player-bg {
        background-color: #1a1a1a;
        background: radial-gradient(circle at center, #2d2d2d 0%, #0a0a0a 100%);
    }

    .album-container {
        width: 100%;
        height: 100%;
        border-radius: 16px;
        overflow: hidden;
        transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .album-container.playing { transform: scale(1.05); }

    .control-bar {
        background: rgba(28, 28, 28, 0.85);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border-radius: 20px;
        padding: 20px 30px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    .progress-container {
        width: 100%;
        height: 5px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        position: relative;
        cursor: pointer;
        margin-bottom: 15px;
    }
    .progress-bar { height: 100%; background: #3B82F6; border-radius: 3px; width: 0%; position: relative; transition: width 0.1s linear; }
    .progress-handle {
        position: absolute; right: -7px; top: -5px; width: 15px; height: 15px;
        background: white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s;
    }
    .progress-container:hover .progress-handle { opacity: 1; }

    .btn-icon { color: #b3b3b3; transition: all 0.2s ease; cursor: pointer; }
    .btn-icon:hover { color: white; transform: scale(1.1); }
    .btn-icon:active { transform: scale(0.95); }

    .play-btn {
        width: 60px; height: 60px; background: #3B82F6; color: white; border-radius: 50%;
        display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(59,130,246,0.4); transition: all 0.2s;
    }
    .play-btn:hover { transform: scale(1.08); background: #2563EB; }
    .play-btn:active { transform: scale(0.95); }

    .volume-container { width: 100px; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; cursor: pointer; position: relative; }
    .volume-fill { width: 100%; height: 100%; background: #3B82F6; border-radius: 2px; }

    @media (max-width: 768px) {
        .control-bar { padding: 15px 20px; width: 95%; }
    }

    /* Animations Splash User */
    .text-gradient-blue { background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .animate-phase-1 { animation: phase1 2s forwards; }
    @keyframes phase1 {
        0% { opacity: 0; transform: scale(0.9); filter: blur(10px); }
        20%, 80% { opacity: 1; transform: scale(1); filter: blur(0px); }
        100% { opacity: 0; transform: scale(1.1); filter: blur(10px); visibility: hidden; }
    }
    .logo-ring { transform-origin: center; animation: rotate-ring 4s linear infinite; }
    @keyframes rotate-ring { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; outline: none; }
    input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; margin-top: -5px; box-shadow: 0 0 10px var(--accent-1); }
</style>

                            foundData = d.data();
                            foundDoc = d;
                        }
                    });

                            const userSnap = await getDoc(userRef);

                                email = parentData.email || email;
                                photoURL = parentData.photoURL || parentData.photo || parentData.avatar || photoURL;
                            }
                        } catch(e) {}
                    }

                    setUser({ uid });
                    setUserData({ name, photoURL, email });
                    localStorage.setItem('lm_v12_key', accessKey);
                    localStorage.setItem('lm_v12_uid', uid);
                    localStorage.setItem('lm_v12_name', name);
                    localStorage.setItem('lm_v12_email', email);
                    if(photoURL) localStorage.setItem('lm_v12_photo', photoURL);
                    
                    fetchUserData(uid);
                    setAppState('main');

                setIsLoadingAuth(false);
            };

            const handleLogout = () => {
                localStorage.clear();
                auth.signOut();
                setUser(null);
                setShowLogoutConfirm(false);
                if (audioRef.current) { audioRef.current.pause(); audioRef.current.src = ""; }
                setAppState('login');
            };

            const createPlaylist = async () => {
                if (!newPlaylistName.trim() || !user) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'playlists'), {
                        name: newPlaylistName,
                        createdAt: Date.now(),
                        tracks: []
                    });
                    setNewPlaylistName('');
                    setIsPlaylistModalOpen(false);
                    showToast("Playlist créée avec succès");
                } catch (e) {
                    showToast("Erreur lors de la création", "error");
                }
            };

            const toggleLike = async (t, e) => {
                if(e) e.stopPropagation();
                let newLikes = [...likedTracks];
                if (newLikes.some(song => song.id === t.id)) {
                    newLikes = newLikes.filter(song => song.id !== t.id);
                    showToast("Retiré des favoris");
                } else {
                    newLikes.push(t);
                    showToast("Ajouté aux favoris");
                }
                setLikedTracks(newLikes);
                localStorage.setItem('lm_v12_likes', JSON.stringify(newLikes));

                if (user) {
                    try {
                        await setDoc(doc(db, "artifacts", appId, "users", user.uid, "library", "likes"), { tracks: newLikes }, { merge: true });
                    } catch (err) {}
                }
            };
            const isLiked = (id) => likedTracks.some(song => song.id === id);

            // --- MOTEUR APPLE MUSIC ---
            const fetchAppleMusic = async (term, limit = 15) => {
                try {
                    const safeTerm = term.replace(/[^a-zA-Z0-9 \-]/g, " ");
                    const seed = Math.random().toString(36).substring(7);
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(safeTerm)}&entity=song&limit=${limit}&_=${seed}`);
                    if (!res.ok) return [];
                    
                    const data = await res.json();
                    return data.results.map(r => ({
                        id: r.trackId, name: r.trackName, artist: r.artistName,
                        image: r.artworkUrl100.replace('100x100bb', '800x800bb'),
                        previewUrl: r.previewUrl, album: r.collectionName,
                        trackViewUrl: r.trackViewUrl
                    })).filter(t => t.previewUrl);
                } catch (e) { return []; }
            };

            useEffect(() => {
                setActiveCategories(shuffleArray(ALL_CATEGORIES));
            }, [reloadTrigger]);

            // CHARGEMENT PROGRESSIF INTÉLLIGENT (SCROLL INFINI)
            useEffect(() => {
                if (appState !== 'main' || view !== 'home' || activeCategories.length === 0) return;
                
                let isMounted = true;
                const loadNextBatch = async () => {
                    setIsLoadingMore(true);
                    const currentCount = homeRows.length;
                    
                    if (currentCount >= catLimit) {
                        setIsLoadingMore(false);
                        return;
                    }
                    
                    const toLoad = activeCategories.slice(currentCount, catLimit);
                    const newRows = [];
                    for (const cat of toLoad) {
                        if (!isMounted) break;
                        const data = await fetchAppleMusic(cat.term, 15);
                        if (data.length > 0) {
                            newRows.push({ ...cat, data });
                        }
                        await new Promise(r => setTimeout(r, 400)); 
                    }
                    
                    if (isMounted) {
                        setHomeRows(prev => [...prev, ...newRows]);
                        setIsLoadingMore(false);
                    }
                };
                
                loadNextBatch();
                return () => { isMounted = false; };
            }, [catLimit, activeCategories, appState, view]);

            const handleScroll = (e) => {
                const bottom = e.target.scrollHeight - e.target.scrollTop - e.target.clientHeight < 400;
                if (bottom && !isLoadingMore && catLimit < activeCategories.length && view === 'home') {
                    setCatLimit(prev => prev + 3); 
                }
            };

            const handleReload = () => {
                setHomeRows([]); 
                setCatLimit(4);
                setSearchQuery('');
                setReloadTrigger(prev => prev + 1);
                setView('home');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            useEffect(() => {
                if (!searchQuery.trim()) { setSearchResults([]); return; }
                const timer = setTimeout(() => {
                    setIsSearching(true);
                    fetchAppleMusic(searchQuery, 40).then(res => {
                        setSearchResults(res);
                        setIsSearching(false);
                    });
                }, 800);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            // --- AUDIO ENGINE AVEC CHOIX YOUTUBE/APPLE ---
            const switchAudioSource = (source) => {
                setAudioSource(source);
                localStorage.setItem('lm_audio_source', source);
                if (source === 'youtube') {
                    audioRef.current.pause();
                } else if (track && isPlaying) {
                    audioRef.current.src = track.previewUrl;
                    audioRef.current.play().catch(()=>{});
                }
            };

            const playTrack = (t, q = null, idx = 0) => {
                if (!t.previewUrl && audioSource === 'apple') return; 
                setTrack(t);
                if (q) { setQueue(q); setQueueIndex(idx); }
                else { setQueue([t]); setQueueIndex(0); }
                
                if (audioSource === 'apple') {
                    audioRef.current.src = t.previewUrl;
                    audioRef.current.play().catch(()=>{});
                } else {
                    audioRef.current.pause(); // Stop apple preview if switching track while on youtube
                }
                setIsPlaying(true);
            };

            const togglePlay = (e) => {
                if(e) e.stopPropagation();
                if (audioSource === 'youtube') {
                    setIsPlaying(!isPlaying);
                    return; // Le lecteur YT a ses propres contrôles
                }
                
                if (isPlaying) audioRef.current.pause();
                else audioRef.current.play();
                setIsPlaying(!isPlaying);
            };

            const handleNext = useCallback(() => {
                if (!queue.length) return;
                const nextIdx = (queueIndex + 1) % queue.length;
                playTrack(queue[nextIdx], queue, nextIdx);
            }, [queue, queueIndex, audioSource]);

            const handlePrev = useCallback(() => {
                if (audioSource === 'apple' && audioRef.current.currentTime > 3) { 
                    audioRef.current.currentTime = 0; return; 
                }
                if (!queue.length) return;
                const prevIdx = (queueIndex - 1 + queue.length) % queue.length;
                playTrack(queue[prevIdx], queue, prevIdx);
            }, [queue, queueIndex, audioSource]);

            useEffect(() => {
                const audio = audioRef.current;
                const updateProgress = () => {
                    setCurTime(audio.currentTime);
                    if (audio.duration) {
                        setDuration(audio.duration);
                        setProgress((audio.currentTime / audio.duration) * 100);
                    }
                };
                const handleEnded = () => { setIsPlaying(false); handleNext(); };
                audio.addEventListener('timeupdate', updateProgress);
                audio.addEventListener('ended', handleEnded);
                return () => { audio.removeEventListener('timeupdate', updateProgress); audio.removeEventListener('ended', handleEnded); };
            }, [handleNext]);

            useEffect(() => {
                if (audioRef.current) audioRef.current.volume = volume;
            }, [volume]);

            const handleSeekClick = (e) => {
                if (audioSource === 'youtube') return; // Désactivé sur YT
                const rect = e.currentTarget.getBoundingClientRect();
                const clickPos = (e.clientX - rect.left) / rect.width;
                const newTime = clickPos * duration;
                if (audioRef.current && duration > 0) {
                    audioRef.current.currentTime = newTime;
                    setCurTime(newTime);
                    setProgress((newTime / duration) * 100);
                }
            };

            const handleVolumeClick = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                let volPos = (e.clientX - rect.left) / rect.width;
                volPos = Math.max(0, Math.min(1, volPos));
                setVolume(volPos);
            };

            // --- ACTIONS OPTIONS (LONG PRESS & BOTTOM SHEET) ---
            const shareTrack = (t) => {
                const url = t.trackViewUrl || `https://music.apple.com/search?term=${encodeURIComponent(t.name + ' ' + t.artist)}`;
                if (navigator.share) {
                    navigator.share({ title: t.name, text: `Écoute "${t.name}" sur LevelMusic !`, url: url }).catch(()=>{});
                } else {
                    navigator.clipboard.writeText(url);
                    showToast("Lien officiel copié dans le presse-papier !");
                }
                setOptionsTrack(null);
            };

            const openArtist = async (t) => {
                setOptionsTrack(null);
                setIsMaximized(false);
                setActiveArtist(t.artist);
                setView('artist');
                setIsLoadingArtist(true);
                const results = await fetchAppleMusic(t.artist, 50);
                setArtistTracks(results);
                setIsLoadingArtist(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const playNextQueue = (t) => {
                setQueue(prev => {
                    const newQ = [...prev];
                    newQ.splice(queueIndex + 1, 0, t);
                    return newQ;
                });
                showToast("Ajouté à la file d'attente");
                setOptionsTrack(null);
            };

            const timerRef = useRef(null);
            let isLongPress = false;
            const handlePointerDown = (t) => {
                isLongPress = false;
                timerRef.current = setTimeout(() => { isLongPress = true; setOptionsTrack(t); }, 500);
            };
            const handlePointerUp = (t, playCallback) => {
                clearTimeout(timerRef.current);
                if (!isLongPress) playCallback();
            };
            const handlePointerMove = () => clearTimeout(timerRef.current);

            const UserAvatar = ({ size = "w-8 h-8", textClass = "text-sm" }) => {
                if (userData.photoURL) {
                    return <img src={userData.photoURL} alt="Profile" className={`${size} rounded-full object-cover border border-white/20`} />;
                }
                return (
                    <div className={`${size} rounded-full bg-blue-600 flex items-center justify-center font-bold text-white shadow-lg ${textClass}`}>
                        {userData.name ? userData.name.charAt(0).toUpperCase() : 'U'}
                    </div>
                );
            };

            // --- VUES DE L'APPLICATION ---
            if (appState === 'splash') {
                return (
                    <div className="fixed inset-0 z-[9999] bg-[#020617] flex items-center justify-center overflow-hidden text-white">
                        <div className="relative flex items-center justify-center w-full max-w-md">
                            <div className="absolute flex flex-col items-center justify-center animate-phase-1 w-full">
                                <div className="relative w-20 h-20 mb-6 flex items-center justify-center">
                                    <svg className="absolute w-full h-full logo-ring" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" r="45" fill="none" stroke="url(#blue-grad)" strokeWidth="1.5" strokeDasharray="70 30" strokeLinecap="round" />
                                        <defs>
                                            <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                                <stop offset="0%" style={{stopColor: '#60a5fa'}} />
                                                <stop offset="100%" style={{stopColor: '#1d4ed8'}} />
                                            </linearGradient>
                                        </defs>
                                    </svg>
                                    <Music className="w-8 h-8 text-blue-500" />
                                </div>
                                <h1 className="text-3xl font-light tracking-[0.2em] uppercase"><span className="font-bold text-white">Level</span><span className="font-bold text-blue-500">Music</span></h1>
                            </div>
                        </div>
                    </div>
                );
            }

            if (appState === 'login') {
                return (
                    <div className="flex flex-col items-center justify-center h-screen px-4 bg-[#020617] z-50 overflow-y-auto">
                        <div className="bg-[#121212]/80 backdrop-blur-3xl border border-white/10 w-full max-w-sm p-10 rounded-[2.5rem] text-center shadow-2xl my-auto">
                            <Music className="w-16 h-16 mb-4 text-blue-500 mx-auto" />
                            <h1 className="text-3xl font-bold mb-8"><span className="text-white">Level</span><span className="text-blue-500">Music</span></h1>
                            <div className="space-y-4">
                                <input type="text" value={accessKey} onChange={e => setAccessKey(e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '').substring(0, 16))} className="w-full bg-[#1a1a1a] border border-white/10 rounded-lg p-4 text-center text-white outline-none focus:border-blue-500 transition-colors font-mono" placeholder="CLÉ D'ACCÈS" />
                                <button onClick={handleLogin} disabled={isLoadingAuth} className="w-full bg-blue-600 text-white py-4 rounded-full font-bold hover:bg-blue-500 transition-colors outline-none disabled:opacity-50">
                                    {isLoadingAuth ? 'Vérification...' : 'Se connecter'}
                                </button>
                            </div>
                            <div className="w-full mt-6 pt-6 border-t border-white/10">
                                <a href="https://ecosystem-of-levelup.vercel.app/" target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 text-[10px] font-bold text-white/50 hover:text-white uppercase tracking-widest outline-none no-underline bg-white/5 py-3 px-6 rounded-full w-full">
                                    <Network size={14} className="text-blue-500" /> Rejoindre l'Écosystème
                                </a>
                            </div>
                            {authError && <p className="text-xs text-red-500 font-bold mt-4">{authError}</p>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen w-screen bg-[#020617] text-white">
                    {/* TOASTS */}
                    <div className="fixed top-20 right-4 z-[10000] flex flex-col gap-2 pointer-events-none">
                        {toasts.map(toast => (
                            <div key={toast.id} className="bg-[#1a1a1a] border border-white/10 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 animate-in slide-in-from-right fade-in duration-300">
                                <span className="text-xs font-bold tracking-wide">{toast.msg}</span>
                            </div>
                        ))}
                    </div>

                    {/* PLAYLIST MODAL */}
                    {isPlaylistModalOpen && (
                        <div className="fixed inset-0 z-[10001] bg-black/80 flex items-center justify-center p-6">
                            <div className="bg-[#1a1a1a] p-8 rounded-[2rem] w-full max-w-sm border border-white/10 shadow-2xl animate-in zoom-in duration-300">
                                <h3 className="text-xl font-bold mb-6">Nouvelle Playlist</h3>
                                <input autoFocus value={newPlaylistName} onChange={e => setNewPlaylistName(e.target.value)} className="w-full bg-black border border-white/10 p-4 rounded-xl mb-6 outline-none focus:border-blue-500 text-white" placeholder="Nom de la playlist..." />
                                <div className="flex gap-4">
                                    <button onClick={() => setIsPlaylistModalOpen(false)} className="flex-1 py-3 text-white/50 font-bold hover:text-white transition-colors outline-none">Annuler</button>
                                    <button onClick={createPlaylist} className="flex-1 py-3 bg-blue-600 rounded-xl font-bold hover:bg-blue-500 transition-colors outline-none">Créer</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* LOGOUT CONFIRM */}
                    {showLogoutConfirm && (
                        <div className="fixed inset-0 z-[10001] bg-black/80 flex items-center justify-center p-4">
                            <div className="bg-[#121212] border border-white/10 rounded-2xl p-8 max-w-sm w-full shadow-2xl animate-in zoom-in duration-200">
                                <h3 className="text-xl font-bold text-white mb-2">Déconnexion</h3>
                                <p className="text-[#A7A7A7] text-sm mb-8 font-medium">Êtes-vous sûr de vouloir vous déconnecter de votre compte LevelMusic ?</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setShowLogoutConfirm(false)} className="flex-1 py-3 rounded-full bg-white/10 text-white font-bold text-sm hover:bg-white/20 transition-colors outline-none">Annuler</button>
                                    <button onClick={handleLogout} className="flex-1 py-3 rounded-full bg-red-600 text-white font-bold text-sm hover:bg-red-500 transition-colors outline-none">Confirmer</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* OPTIONS PISTE (BOTTOM SHEET) */}
                    {optionsTrack && (
                        <div className="fixed inset-0 z-[10000] bg-black/60 flex items-end justify-center" onClick={() => setOptionsTrack(null)}>
                            <div className="bg-[#121212] w-full max-w-md rounded-t-[2.5rem] p-8 border-t border-white/10 animate-in slide-in-from-bottom duration-300" onClick={e => e.stopPropagation()}>
                                <div className="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
                                <div className="flex items-center gap-4 mb-8 border-b border-white/10 pb-6">
                                    <img src={optionsTrack.image} className="w-16 h-16 rounded-xl object-cover shadow-lg" alt=""/>
                                    <div className="min-w-0"><h3 className="font-bold truncate text-lg text-white">{optionsTrack.name}</h3><p className="text-blue-500 text-sm truncate">{optionsTrack.artist}</p></div>
                                </div>
                                <div className="space-y-2">
                                    <button onClick={(e) => { toggleLike(optionsTrack, e); setOptionsTrack(null); }} className="w-full flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition-colors outline-none">
                                        <Heart size={22} className={isLiked(optionsTrack.id) ? 'text-blue-500 fill-blue-500' : 'text-white'}/> <span className="font-medium text-white">{isLiked(optionsTrack.id) ? 'Retirer des favoris' : 'Ajouter aux favoris'}</span>
                                    </button>
                                    <button onClick={() => { showToast("Veuillez créer une playlist d'abord !"); setOptionsTrack(null); }} className="w-full flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition-colors outline-none">
                                        <ListPlus size={22} className="text-white"/> <span className="font-medium text-white">Ajouter à une playlist</span>
                                    </button>
                                    <button onClick={() => playNextQueue(optionsTrack)} className="w-full flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition-colors outline-none">
                                        <ListMusic size={22} className="text-white"/> <span className="font-medium text-white">Écouter ensuite</span>
                                    </button>
                                    <button onClick={() => openArtist(optionsTrack)} className="w-full flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition-colors outline-none">
                                        <Mic2 size={22} className="text-white"/> <span className="font-medium text-white">Voir l'artiste</span>
                                    </button>
                                    <button onClick={() => shareTrack(optionsTrack)} className="w-full flex items-center gap-4 p-4 hover:bg-white/5 rounded-2xl transition-colors outline-none">
                                        <Share2 size={22} className="text-blue-500"/> <span className="font-medium text-white">Partager (Lien Officiel)</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HEADER FIXE */}
                    <header className="fixed top-0 w-full p-4 md:px-8 flex justify-between items-center z-50 header-blur shadow-md">
                        <div className="flex items-center gap-2 cursor-pointer outline-none" onClick={handleReload}>
                            <CustomLogo className="w-8 h-8 text-blue-500" />
                            <span className="font-bold text-xl hidden sm:block"><span className="text-white">Level</span><span className="text-blue-500">Music</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-xs w-40 md:w-64 outline-none focus:border-blue-500 text-white" placeholder="Rechercher monde..." />
                            <div className="flex items-center gap-2 cursor-pointer outline-none" onClick={() => setView('profile')}>
                                <UserAvatar size="w-8 h-8" textClass="text-sm shadow-md" />
                            </div>
                        </div>
                    </header>

                    {/* CONTENT AVEC INFINITE SCROLL */}
                    <main onScroll={handleScroll} className="flex-1 overflow-y-auto pb-40 pt-20 md:pt-24 px-4 md:px-8 relative z-10 scroll-smooth no-scrollbar">
                        
                        {view === 'home' && (
                            <div className="max-w-[1800px] mx-auto space-y-8 animate-in fade-in duration-500">
                                {homeRows.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-32 space-y-4">
                                        <div className="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500"></div>
                                        <span className="text-white/50 text-xs font-bold tracking-widest uppercase animate-pulse">Chargement du catalogue...</span>
                                    </div>
                                ) : (
                                    <>
                                    <h2 className="text-3xl font-bold text-white mb-4 pt-2">Découvrir.</h2>
                                    {homeRows.map((row, index) => (
                                        <div key={row.id} className="space-y-3">
                                            <h3 className="text-lg md:text-xl font-bold text-white pl-2 leading-none">{row.title}</h3>
                                            <div className="row-scroll pl-2">
                                                {row.data.map((t, idx) => (
                                                    <div 
                                                        key={t.id} 
                                                        onPointerDown={() => handlePointerDown(t)} 
                                                        onPointerUp={() => handlePointerUp(t, () => playTrack(t, row.data, idx))} 
                                                        onPointerMove={handlePointerMove} 
                                                        onPointerCancel={handlePointerMove} 
                                                        onContextMenu={(e) => e.preventDefault()} 
                                                        className="row-item w-[100px] md:w-[120px] p-2 bg-[#181818] hover:bg-[#282828] rounded-xl cursor-pointer transition-colors group shadow-lg"
                                                    >
                                                        <div className="relative aspect-square rounded-lg overflow-hidden mb-2 shadow-sm pointer-events-none">
                                                            <img src={t.image} className="w-full h-full object-cover" alt=""/>
                                                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                                <div className="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center shadow-lg">
                                                                    <Play size={14} fill="white" className="text-white ml-0.5" />
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <h4 className="text-[10px] md:text-[11px] font-bold truncate pointer-events-none text-white mb-0.5">{t.name}</h4>
                                                        <p className="text-[8px] md:text-[9px] text-blue-500 truncate pointer-events-none font-bold uppercase tracking-widest">{t.artist}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                    {isLoadingMore && (
                                        <div className="flex justify-center py-6">
                                            <div className="animate-spin rounded-full h-6 w-6 border-t-2 border-b-2 border-blue-500"></div>
                                        </div>
                                    )}
                                    </>
                                )}
                            </div>
                        )}

                        {view === 'search' && (
                            <div className="max-w-[1800px] mx-auto animate-in fade-in duration-500">
                                <h3 className="text-xl font-bold mb-6 pl-2 border-l-4 border-blue-500">Résultats pour "{searchQuery}"</h3>
                                {isSearching ? (
                                    <div className="flex justify-center py-20"><div className="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500"></div></div>
                                ) : searchResults.length > 0 ? (
                                    <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3">
                                        {searchResults.map((t, idx) => (
                                            <div 
                                                key={t.id} 
                                                onPointerDown={() => handlePointerDown(t)} 
                                                onPointerUp={() => handlePointerUp(t, () => playTrack(t, searchResults, idx))} 
                                                onPointerMove={handlePointerMove} 
                                                onPointerCancel={handlePointerMove} 
                                                onContextMenu={(e) => e.preventDefault()} 
                                                className="bg-white/5 hover:bg-white/10 rounded-xl p-2 cursor-pointer transition-colors group shadow-lg"
                                            >
                                                <div className="relative aspect-square rounded-lg overflow-hidden mb-2 pointer-events-none">
                                                    <img src={t.image} className="w-full h-full object-cover" alt="" />
                                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                        <div className="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center shadow-lg">
                                                            <Play size={14} fill="white" className="text-white ml-0.5" />
                                                        </div>
                                                    </div>
                                                </div>
                                                <h4 className="text-[10px] md:text-[11px] font-bold text-white truncate pointer-events-none">{t.name}</h4>
                                                <p className="text-[8px] md:text-[9px] text-blue-500 font-bold uppercase tracking-widest truncate mt-0.5 pointer-events-none">{t.artist}</p>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <p className="text-center py-20 text-[#A7A7A7]">Aucun résultat trouvé dans la base de données mondiale.</p>
                                )}
                            </div>
                        )}

                        {view === 'artist' && (
                            <div className="max-w-[1800px] mx-auto animate-in fade-in duration-500">
                                <div className="mb-10 flex flex-col items-center justify-center py-10 bg-[#121212] rounded-3xl border border-white/5">
                                    <div className="w-24 h-24 rounded-full bg-blue-600 flex items-center justify-center text-4xl font-bold text-white shadow-2xl mb-4">
                                        {activeArtist.charAt(0).toUpperCase()}
                                    </div>
                                    <h2 className="text-3xl md:text-5xl font-black text-white text-center px-4">{activeArtist}</h2>
                                    <p className="text-blue-500 font-bold uppercase tracking-widest mt-2 text-xs">Discographie Mondiale</p>
                                </div>
                                {isLoadingArtist ? (
                                    <div className="flex justify-center py-20"><div className="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500"></div></div>
                                ) : (
                                    <div>
                                        <h3 className="text-xl font-bold mb-6 pl-2 border-l-4 border-blue-500">Titres populaires</h3>
                                        <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-3">
                                            {artistTracks.map((t, idx) => (
                                                <div key={t.id} onPointerDown={() => handlePointerDown(t)} onPointerUp={() => handlePointerUp(t, () => playTrack(t, artistTracks, idx))} onPointerMove={handlePointerMove} onPointerCancel={handlePointerMove} onContextMenu={(e) => e.preventDefault()} className="bg-white/5 hover:bg-white/10 rounded-xl p-2 cursor-pointer transition-colors group shadow-lg">
                                                    <div className="relative aspect-square rounded-lg overflow-hidden mb-2 pointer-events-none">
                                                        <img src={t.image} className="w-full h-full object-cover" alt="" />
                                                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                                            <div className="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center shadow-lg">
                                                                <Play size={14} fill="white" className="text-white ml-0.5" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <h4 className="text-[10px] md:text-[11px] font-bold text-white truncate pointer-events-none">{t.name}</h4>
                                                    <p className="text-[8px] md:text-[9px] text-[#A7A7A7] truncate mt-0.5 pointer-events-none">{t.album}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="max-w-2xl mx-auto pt-10 text-center animate-in fade-in duration-500">
                                <div className="mb-10">
                                    <div className="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-4xl font-bold shadow-xl overflow-hidden border-2 border-blue-500/50">
                                        {userData.photoURL ? <img src={userData.photoURL} className="w-full h-full object-cover" /> : userData.name.charAt(0).toUpperCase()}
                                    </div>
                                    <h2 className="text-3xl font-bold text-white">{userData.name}</h2>
                                    {userData.email && <p className="text-[#A7A7A7] mt-2 font-mono bg-white/5 px-4 py-1.5 rounded-full inline-block text-xs border border-white/10">{userData.email}</p>}
                                </div>
                                <div className="grid grid-cols-1 gap-4 text-left">
                                    <div className="bg-[#121212] p-6 rounded-3xl border border-white/10 flex justify-between items-center shadow-lg">
                                        <div className="flex items-center gap-4"><Heart className="text-blue-500" /> Favoris</div>
                                        <span className="font-bold text-lg">{likedTracks.length}</span>
                                    </div>
                                    <div className="bg-[#121212] p-6 rounded-3xl border border-white/10 flex justify-between items-center shadow-lg">
                                        <div className="flex items-center gap-4"><ListMusic className="text-blue-500" /> Mes Playlists</div>
                                        <span className="font-bold text-lg">{playlists.length}</span>
                                    </div>
                                    <div onClick={() => setIsPlaylistModalOpen(true)} className="bg-[#121212] p-6 rounded-3xl border border-blue-500/30 flex justify-between items-center cursor-pointer hover:bg-blue-600/20 transition-colors shadow-lg">
                                        <div className="flex items-center gap-4"><Plus className="text-blue-500" /> Créer une playlist</div>
                                    </div>
                                    <button onClick={() => setShowLogoutConfirm(true)} className="w-full mt-10 py-4 bg-red-500/10 text-red-500 rounded-2xl font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition-colors outline-none">Se déconnecter</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MINI PLAYER FLOTTANT */}
                    {track && !isMaximized && (
                        <div className="fixed bottom-[80px] left-4 right-4 md:left-auto md:right-8 md:w-[380px] h-[64px] bg-[#1a1a1a]/95 backdrop-blur-xl border border-white/10 rounded-2xl flex items-center px-3 gap-3 z-[90] cursor-pointer shadow-2xl hover:bg-[#282828] transition-colors" onClick={() => setIsMaximized(true)}>
                            <img src={track.image} className="w-12 h-12 rounded-lg object-cover shadow-sm" alt=""/>
                            <div className="flex-1 min-w-0 pr-2">
                                <h4 className="text-sm font-bold text-white truncate">{track.name}</h4>
                                <p className="text-[10px] text-blue-500 truncate uppercase font-bold mt-0.5">{track.artist}</p>
                            </div>
                            <button onClick={(e) => { e.stopPropagation(); toggleLike(track, e); }} className="p-2 outline-none">{isLiked(track.id) ? <Heart size={20} fill="#3B82F6" color="#3B82F6" /> : <Heart size={20} className="text-[#A7A7A7] hover:text-white"/>}</button>
                            <button onClick={togglePlay} className="w-10 h-10 flex items-center justify-center text-white transition-transform hover:scale-105 outline-none">
                                {isPlaying ? <Pause size={24}/> : <Play size={24} fill="white" className="ml-1" />}
                            </button>
                            <div className="absolute bottom-0 left-2 right-2 h-[2px] bg-white/10 rounded-full overflow-hidden">
                                <div className="h-full bg-blue-500" style={{width: `${progress}%`}}></div>
                            </div>
                        </div>
                    )}

                    {/* VRAI LECTEUR PLEIN ÉCRAN (AVEC OPTION YOUTUBE) */}
                    {isMaximized && track && (
                        <div className="fixed inset-0 z-[1000] flex flex-col player-bg animate-in slide-in-from-bottom duration-300 overflow-y-auto no-scrollbar pb-[180px]">
                            
                            <header className="p-4 md:p-6 flex justify-between items-center z-10 shrink-0">
                                <button onClick={() => setIsMaximized(false)} className="p-2 bg-white/5 rounded-full outline-none hover:bg-white/10 transition-colors"><ChevronDown size={32}/></button>
                                <div className="flex flex-col items-center">
                                    <span className="text-[10px] font-black uppercase tracking-[0.4em] text-blue-500">En Lecture</span>
                                    <div className="flex bg-white/10 p-0.5 rounded-full mt-2">
                                        <button onClick={() => switchAudioSource('apple')} className={`px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider outline-none ${audioSource === 'apple' ? 'bg-blue-600 text-white' : 'text-white/50'}`}>Aperçu (Apple)</button>
                                        <button onClick={() => switchAudioSource('youtube')} className={`px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider outline-none ${audioSource === 'youtube' ? 'bg-red-600 text-white' : 'text-white/50'}`}><Youtube size={10} className="inline mr-1"/> Complet</button>
                                    </div>
                                </div>
                                <button onClick={() => setOptionsTrack(track)} className="p-2 bg-white/5 rounded-full outline-none hover:bg-white/10 transition-colors"><MoreHorizontal size={24}/></button>
                            </header>

                            <div className="flex-1 flex flex-col items-center justify-center p-6 min-h-[350px]">
                                <div className={`album-container w-[240px] md:w-[320px] aspect-square rounded-2xl shadow-[0_30px_60px_rgba(0,0,0,0.8)] overflow-hidden ${audioSource === 'apple' && isPlaying ? 'playing' : ''}`}>
                                    {audioSource === 'youtube' ? (
                                        <iframe 
                                            className="w-full h-full"
                                            src={`https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(track.name + ' ' + track.artist + ' audio')}&autoplay=1`} 
                                            frameBorder="0" 
                                            allow="autoplay; encrypted-media" 
                                            allowFullScreen
                                        ></iframe>
                                    ) : (
                                        <img src={track.image.replace('600x600bb', '1000x1000bb')} className="w-full h-full object-cover" />
                                    )}
                                </div>
                                <div className="text-center w-full max-w-lg px-4 mt-6">
                                    <h2 className="text-2xl md:text-3xl font-bold tracking-tight mb-2 text-white line-clamp-2">{track.name}</h2>
                                    <p className="text-[#A7A7A7] text-base font-medium truncate">{track.artist}</p>
                                </div>
                            </div>

                            <div className="control-bar fixed bottom-6 left-1/2 -translate-x-1/2 z-50 w-[95%] md:w-[90%] max-w-3xl">
                                {audioSource === 'apple' ? (
                                    <div className="flex items-center gap-4 mb-2">
                                        <span className="text-[11px] font-mono text-gray-500 w-10">{formatTime(curTime)}</span>
                                        <div className="progress-container flex-1" onClick={handleSeekClick}>
                                            <div className="progress-bar" style={{width: `${progress}%`}}>
                                                <div className="progress-handle"></div>
                                            </div>
                                        </div>
                                        <span className="text-[11px] font-mono text-gray-500 w-10 text-right">{formatTime(duration)}</span>
                                    </div>
                                ) : (
                                    <div className="text-center py-2 mb-2">
                                        <p className="text-[#A7A7A7] text-[10px] font-bold uppercase tracking-widest flex justify-center items-center gap-2">
                                            <Youtube size={14} className="text-red-500"/> Contrôles via le lecteur vidéo
                                        </p>
                                    </div>
                                )}

                                <div className="flex items-center justify-between mt-4">
                                    <div className="hidden md:flex items-center gap-3 w-1/4">
                                        <Volume2 className="w-5 h-5 text-gray-400" />
                                        <div className="volume-container" onClick={handleVolumeClick}>
                                            <div className="volume-fill" style={{width: `${volume * 100}%`}}></div>
                                        </div>
                                    </div>
                                    <div className="w-1/4 md:hidden"></div>

                                    <div className="flex items-center justify-center gap-6 md:gap-8 w-2/4">
                                        <SkipBack className={`btn-icon w-6 h-6 ${audioSource === 'youtube' ? 'opacity-30' : ''}`} onClick={handlePrev} />
                                        <button onClick={togglePlay} className={`play-btn outline-none ${audioSource === 'youtube' ? 'opacity-30 cursor-not-allowed' : ''}`}>
                                            {isPlaying && audioSource === 'apple' ? <Pause className="w-6 h-6" fill="black" /> : <Play className="w-6 h-6 ml-1" fill="black" />}
                                        </button>
                                        <SkipForward className={`btn-icon w-6 h-6 ${audioSource === 'youtube' ? 'opacity-30' : ''}`} onClick={handleNext} />
                                    </div>

                                    <div className="flex items-center justify-end gap-4 md:gap-5 w-1/4">
                                        <Heart className={`btn-icon w-5 h-5 ${isLiked(track.id) ? 'text-blue-500 fill-blue-500' : ''}`} onClick={(e) => toggleLike(track, e)} />
                                        <MoreHorizontal className="btn-icon w-5 h-5" onClick={() => setOptionsTrack(track)} />
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* NAV BAR */}
                    <nav className="fixed bottom-0 w-full h-[70px] bg-black/90 backdrop-blur-xl border-t border-white/5 flex justify-around items-center z-40">
                        <button onClick={handleReload} className={`flex flex-col items-center gap-1 outline-none ${view === 'home' ? 'text-blue-500' : 'text-white/40'}`}><Home size={22} /><span className="text-[9px] font-bold uppercase tracking-widest">Accueil</span></button>
                        <button onClick={() => setView('search')} className={`flex flex-col items-center gap-1 outline-none ${view === 'search' ? 'text-blue-500' : 'text-white/40'}`}><Search size={22} strokeWidth={view==='search'?3:2} /><span className="text-[9px] font-bold uppercase tracking-widest">Recherche</span></button>
                        <button onClick={() => setView('profile')} className={`flex flex-col items-center gap-1 outline-none ${view === 'profile' ? 'text-blue-500' : 'text-white/40'}`}><User size={22} /><span className="text-[9px] font-bold uppercase tracking-widest">Profil</span></button>
                    </nav>
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
