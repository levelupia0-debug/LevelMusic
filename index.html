<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LevelMusic - L'Écosystème Premium</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Maps -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
      }
    }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#060608] text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Play, Info, Search, X, ChevronLeft, ChevronRight, 
          Star, Key, LogOut, Globe, Shield, CheckCircle, AlertTriangle, 
          Home, Music, Disc, Headphones, FastForward, Rewind, Pause, 
          Bookmark, Plus, Share2, Filter, HardDrive, ListMusic
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, collectionGroup, getDocs, doc, setDoc, deleteDoc, collection } from 'firebase/firestore';

        // --- LOGO LEVEL MUSIC PRO ---
        const LevelMusicLogo = ({ className = "w-6 h-6", color = "currentColor" }) => (
          <Music className={className} color={color} />
        );

        // --- CONFIGURATION FIREBASE (La même que LevelMovie pour partager les clés d'accès !) ---
        const firebaseConfig = {
          apiKey: "AIzaSyA3JgvNu5p-43037jvm4WRDaJHI9ES7uGM",
          authDomain: "levelup-ia.firebaseapp.com",
          projectId: "levelup-ia",
          storageBucket: "levelup-ia.firebasestorage.app",
          messagingSenderId: "229420004282",
          appId: "1:229420004282:web:6735f059a947f0936ae383",
          measurementId: "G-MSRDY2574K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "level-ia-premium";

        // --- STYLES GLOBAUX (Anti-sélection comme LevelMovie) ---
        const globalStyles = `
          @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
          
          * { user-select: none; -webkit-user-select: none; scrollbar-width: none; }
          input, textarea { user-select: auto; -webkit-user-select: auto; }
          body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #060608; overflow-x: hidden; -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); padding-top: env(safe-area-inset-top); }
          ::-webkit-scrollbar { display: none; }
          .bg-main { background: radial-gradient(circle at 50% 0%, #1a1025 0%, #060608 80%); min-height: 100vh; }
          .holo-card { background: linear-gradient(135deg, rgba(30,20,45,0.6) 0%, rgba(10,10,15,0.8) 100%); border: 1px solid rgba(168,85,247,0.2); box-shadow: inset 0 0 30px rgba(168,85,247,0.05), 0 30px 60px rgba(0,0,0,0.8); backdrop-filter: blur(30px); }
          
          .splash-text { opacity: 0; position: absolute; transform: scale(0.85); filter: blur(15px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); text-align: center; }
          .splash-text.active { opacity: 1; transform: scale(1); filter: blur(0px); }
          .splash-text.exit { opacity: 0; transform: scale(1.2); filter: blur(30px); }
        `;

        function App() {
          const [user, setUser] = useState(null);
          const [userName, setUserName] = useState('');
          const [accessKey, setAccessKey] = useState('');
          const [authError, setAuthError] = useState('');
          const [isLoadingAuth, setIsLoadingAuth] = useState(false);
          const [isScrolled, setIsScrolled] = useState(false);
          
          // Splash
          const [showSplash, setShowSplash] = useState(true);
          const [splashStep, setSplashStep] = useState(0);

          // Navigation & UI
          const [currentCategory, setCurrentCategory] = useState('home');
          const [selectedAlbum, setSelectedAlbum] = useState(null);
          const [currentTrack, setCurrentTrack] = useState(null);
          const [showSettings, setShowSettings] = useState(false);
          const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
          const [toasts, setToasts] = useState([]);

          // Recherche
          const [searchQuery, setSearchQuery] = useState('');
          const [searchResults, setSearchResults] = useState([]);

          // Watchlist
          const [watchlist, setWatchlist] = useState([]);
          const [watchlistData, setWatchlistData] = useState([]);

          // --- INITIALISATION ---
          useEffect(() => {
            signInAnonymously(auth).catch(console.error);
            const savedKey = localStorage.getItem('levelmovie_saved_key');
            const savedName = localStorage.getItem('levelmovie_user_name');
            const savedUid = localStorage.getItem('levelmovie_user_uid');
            
            if (savedKey && savedUid) {
              setUser({ uid: savedUid });
              if (savedName) setUserName(savedName);
            }

            // Animation Splash
            const t1 = setTimeout(() => setSplashStep(1), 200);   
            const t2 = setTimeout(() => setSplashStep(2), 1400);  
            const t3 = setTimeout(() => setSplashStep(3), 2800);  
            const t4 = setTimeout(() => { setSplashStep(4); setShowSplash(false); }, 3200);

            const handleScroll = () => setIsScrolled(window.scrollY > 30);
            window.addEventListener('scroll', handleScroll);
            return () => {
                clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4);
                window.removeEventListener('scroll', handleScroll);
            }
          }, []);

          // --- FETCH WATCHLIST (Firebase) ---
          useEffect(() => {
            if (!user) return;
            const localData = JSON.parse(localStorage.getItem('levelmusic_watchlist_' + user.uid) || '[]');
            if (localData.length > 0) {
              setWatchlistData(localData);
              setWatchlist(localData.map(m => m.id));
            }
            const fetchWatchlist = async () => {
              try {
                // Utilise une collection différente pour ne pas mélanger avec les films !
                const q = collection(db, "artifacts", APP_ID, "users", user.uid, "watchlist_music");
                const snaps = await getDocs(q);
                const data = [];
                snaps.forEach(doc => data.push(doc.data()));
                if (data.length > 0 || localData.length > 0) {
                    setWatchlist(data.map(m => m.id));
                    setWatchlistData(data);
                    localStorage.setItem('levelmusic_watchlist_' + user.uid, JSON.stringify(data));
                }
              } catch (e) {}
            };
            fetchWatchlist();
          }, [user]);

          // --- RECHERCHE MONDIALE (API APPLE MUSIC) ---
          useEffect(() => {
            if (searchQuery.trim() === '') {
              setSearchResults([]);
              return;
            }
            const delayDebounceFn = setTimeout(async () => {
              try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchQuery)}&entity=album&limit=25&country=FR`);
                const data = await res.json();
                const formatted = data.results.map(r => ({
                    id: r.collectionId,
                    name: r.collectionName,
                    artist: r.artistName,
                    image: r.artworkUrl100.replace('100x100bb', '600x600bb')
                }));
                setSearchResults(formatted);
              } catch (e) {}
            }, 500);
            return () => clearTimeout(delayDebounceFn);
          }, [searchQuery]);

          // --- TOASTS ---
          const showToast = useCallback((msg, type = 'info') => {
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type }]);
            setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
          }, []);

          // --- ACTIONS GLOBALES ---
          const toggleWatchlist = async (album) => {
            if (!user) return;
            const isAdded = watchlist.includes(album.id);
            let newList;
            if (isAdded) {
                newList = watchlistData.filter(m => m.id !== album.id);
                showToast("Retiré des favoris", "success");
            } else {
                const dataObj = { id: album.id, name: album.name, artist: album.artist, image: album.image, addedAt: Date.now() };
                newList = [...watchlistData, dataObj];
                showToast("Ajouté aux favoris !", "success");
            }
            setWatchlistData(newList);
            setWatchlist(newList.map(m => m.id));
            localStorage.setItem('levelmusic_watchlist_' + user.uid, JSON.stringify(newList));
            try {
                const ref = doc(db, "artifacts", APP_ID, "users", user.uid, "watchlist_music", album.id.toString());
                if (isAdded) await deleteDoc(ref);
                else await setDoc(ref, newList.find(m => m.id === album.id));
            } catch(e) {}
          };

          const handleNavCategory = (cat) => {
            setCurrentCategory(cat);
            setSearchQuery('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const formatAccessKey = (val) => {
            let formatted = val.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            setAccessKey(formatted.substring(0, 16));
          };

          const handleLogin = async () => {
            if (!accessKey) return;
            setIsLoadingAuth(true);
            setAuthError('');
            try {
              const q = collectionGroup(db, 'security');
              const querySnapshot = await getDocs(q);
              let foundUserData = null;
              querySnapshot.forEach(docSnap => {
                if (docSnap.data().key === accessKey) foundUserData = docSnap.data();
              });
              
              if (foundUserData) {
                const uid = foundUserData.uid || accessKey;
                const name = foundUserData.name || foundUserData.displayName || "Utilisateur";
                setUser({ uid });
                setUserName(name);
                localStorage.setItem('levelmovie_saved_key', accessKey);
                localStorage.setItem('levelmovie_user_name', name);
                localStorage.setItem('levelmovie_user_uid', uid);
              } else {
                setAuthError("Clé invalide.");
              }
            } catch (error) {
              setAuthError("Erreur serveur.");
            }
            setIsLoadingAuth(false);
          };

          // ---------------------------------------------
          // SPLASH SCREEN
          // ---------------------------------------------
          if (showSplash) {
            return (
              <div className={`fixed inset-0 z-[9999] bg-[#060608] flex items-center justify-center flex-col transition-opacity duration-500 ${splashStep === 3 ? 'opacity-0' : 'opacity-100'}`}>
                <style>{globalStyles}</style>
                <div className={`splash-text flex flex-col items-center ${splashStep === 1 ? 'active' : ''} ${splashStep >= 2 ? 'exit' : ''}`}>
                   <div className="w-20 h-20 bg-gradient-to-tr from-[#8b5cf6] to-[#a855f7] rounded-full flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(168,85,247,0.5)]">
                      <Music className="w-10 h-10 text-white" />
                   </div>
                   <div className="text-4xl font-black tracking-widest">
                     <span className="text-white">Level</span><span className="text-[#a855f7]">Music</span>
                   </div>
                </div>
                <div className={`splash-text flex flex-col items-center justify-center ${splashStep === 2 ? 'active' : ''} ${splashStep >= 3 ? 'exit' : ''}`}>
                   <span className="text-white font-black tracking-[0.6em] text-2xl uppercase">LevelUp</span>
                   <span className="text-[10px] font-bold tracking-[0.5em] text-[#a855f7] mt-4 uppercase">Version Audio</span>
                </div>
              </div>
            );
          }

          // ---------------------------------------------
          // ÉCRAN DE CONNEXION (Si pas de clé LVL)
          // ---------------------------------------------
          if (!user) {
            return (
              <div className="bg-main flex items-center justify-center p-4 sm:p-8 fixed inset-0 z-[5000]">
                <style>{globalStyles}</style>
                <div className="w-full max-w-sm text-center py-4 relative glass p-8 rounded-[2rem] border border-white/5 shadow-[0_0_50px_rgba(168,85,247,0.15)] bg-black/40 backdrop-blur-xl">
                  <LevelMusicLogo className="w-12 h-12 text-[#a855f7] mx-auto mb-4" />
                  <h1 className="text-3xl font-black tracking-widest mb-10 drop-shadow-md">
                    <span className="text-white">Level</span><span className="text-[#a855f7]">Music</span>
                  </h1>
                  <div className="space-y-6">
                    <p className="text-[11px] font-bold text-[#a855f7] uppercase tracking-[0.1em] mb-2 flex items-center justify-center gap-2">
                      <Shield className="w-4 h-4" /> Clé d'Accès requise
                    </p>
                    <input 
                      type="text" value={accessKey} onChange={(e) => formatAccessKey(e.target.value)}
                      placeholder="LVL-XXXXX-XXXXX" 
                      className="w-full bg-[#030305] border border-[#a855f7]/40 rounded-xl py-4 px-5 text-center text-white font-mono text-base tracking-widest outline-none focus:border-[#a855f7] transition-all uppercase"
                    />
                    <button 
                      onClick={handleLogin} disabled={isLoadingAuth}
                      className="w-full bg-gradient-to-r from-[#8b5cf6] to-[#a855f7] text-white py-4 rounded-xl font-black text-[12px] uppercase tracking-[0.1em] hover:opacity-90 active:scale-95 shadow-[0_0_25px_rgba(168,85,247,0.4)] disabled:opacity-50 outline-none"
                    >
                      {isLoadingAuth ? "Vérification..." : "Connexion"}
                    </button>
                    {authError && <p className="text-[12px] text-red-400 font-bold mt-2">{authError}</p>}
                  </div>
                </div>
              </div>
            );
          }

          // ---------------------------------------------
          // APPLICATION PRINCIPALE
          // ---------------------------------------------
          return (
            <div className="bg-main text-white min-h-screen pb-28">
              <style>{globalStyles}</style>

              {/* TOASTS */}
              <div className="fixed top-4 right-4 md:top-6 md:right-6 z-[9999] flex flex-col gap-3 pointer-events-none items-end">
                {toasts.map(toast => {
                  let icon = <CheckCircle className="w-5 h-5 text-[#a855f7]" />;
                  let colorClass = 'border-[#a855f7]/30 bg-[#0a0a0f]/95 text-white';
                  if (toast.type === 'error') {
                    icon = <AlertTriangle className="w-5 h-5 text-red-400" />;
                    colorClass = 'border-red-500/30 bg-[#0a0a0f]/95 text-red-50';
                  }
                  return (
                    <div key={toast.id} className={`flex items-center gap-4 p-4 rounded-2xl backdrop-blur-3xl border shadow-2xl transition-all duration-500 animate-in slide-in-from-right fade-in ${colorClass} min-w-[280px] pointer-events-auto`}>
                      {icon} <span className="text-[12px] font-bold tracking-wide">{toast.msg}</span>
                    </div>
                  );
                })}
              </div>

              {/* HEADER (Exactement comme LevelMovie) */}
              <header className={`fixed top-0 w-full z-50 transition-all duration-500 flex items-center justify-between px-4 md:px-10 py-3 md:py-4 ${isScrolled ? 'bg-black/80 backdrop-blur-2xl border-b border-white/5 shadow-xl' : 'bg-gradient-to-b from-[#060608] via-[#060608]/90 to-transparent'}`}>
                <div className="flex items-center space-x-6 md:space-x-10">
                  <div className="flex items-center gap-3 cursor-pointer outline-none" onClick={() => handleNavCategory('home')}>
                    <h1 className="text-xl md:text-2xl font-black tracking-widest leading-none drop-shadow-lg flex items-center gap-2">
                      <LevelMusicLogo className="w-6 h-6 text-[#a855f7] sm:hidden" />
                      <span className="hidden sm:inline"><span className="text-white">Level</span><span className="text-[#a855f7]">Music</span></span>
                    </h1>
                  </div>
                  
                  <nav className="hidden lg:flex space-x-6 text-[12px] font-bold uppercase tracking-widest text-white/60">
                    <button onClick={() => handleNavCategory('home')} className={`hover:text-white outline-none transition-colors ${currentCategory === 'home' ? 'text-[#a855f7]' : ''}`}>Découvrir</button>
                    <button onClick={() => handleNavCategory('playlists')} className={`hover:text-white outline-none transition-colors ${currentCategory === 'playlists' ? 'text-[#a855f7]' : ''}`}>Genres</button>
                    <button onClick={() => handleNavCategory('watchlist')} className={`hover:text-white outline-none transition-colors ${currentCategory === 'watchlist' ? 'text-[#a855f7]' : ''}`}>Ma Musique</button>
                  </nav>
                </div>
                
                <div className="flex items-center space-x-3 md:space-x-6">
                  {/* BARRE DE RECHERCHE */}
                  <div className="flex items-center relative">
                    <input 
                      type="text" 
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      placeholder="Artistes, albums, sons..." 
                      className="bg-[#151520] border border-white/10 text-white text-xs px-4 py-2 rounded-full outline-none w-36 md:w-64 focus:border-[#a855f7] transition-colors shadow-inner"
                    />
                  </div>
                  
                  {/* PROFIL */}
                  <div className="flex items-center gap-3 p-1.5 pr-3 md:pr-4 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all cursor-pointer shadow-md outline-none" onClick={() => setShowSettings(true)}>
                    <div className="w-8 h-8 md:w-9 md:h-9 rounded-full bg-[#151520] flex items-center justify-center overflow-hidden border border-[#a855f7]/40 shadow-inner shrink-0">
                      <span className="text-[12px] md:text-[13px] font-black text-[#a855f7]">{userName ? userName.charAt(0).toUpperCase() : 'U'}</span>
                    </div>
                    <div className="hidden md:block min-w-0">
                      <p className="text-[12px] font-bold uppercase truncate tracking-wide text-white/90">{userName || 'Utilisateur'}</p>
                    </div>
                  </div>
                </div>
              </header>

              {/* NAVBAR MOBILE */}
              <nav className="lg:hidden fixed bottom-0 w-full z-50 bg-[#060608]/95 backdrop-blur-xl border-t border-white/5 flex justify-around items-center py-3 shadow-[0_-10px_20px_rgba(0,0,0,0.5)] pb-[env(safe-area-inset-bottom)]">
                <button onClick={() => handleNavCategory('home')} className={`flex flex-col items-center gap-1 outline-none transition-colors ${currentCategory === 'home' ? 'text-[#a855f7]' : 'text-white/50 hover:text-white'}`}>
                  <Home className="w-5 h-5" /> <span className="text-[9px] font-bold uppercase tracking-widest">Accueil</span>
                </button>
                <button onClick={() => handleNavCategory('playlists')} className={`flex flex-col items-center gap-1 outline-none transition-colors ${currentCategory === 'playlists' ? 'text-[#a855f7]' : 'text-white/50 hover:text-white'}`}>
                  <Disc className="w-5 h-5" /> <span className="text-[9px] font-bold uppercase tracking-widest">Genres</span>
                </button>
                <button onClick={() => handleNavCategory('watchlist')} className={`flex flex-col items-center gap-1 outline-none transition-colors ${currentCategory === 'watchlist' ? 'text-[#a855f7]' : 'text-white/50 hover:text-white'}`}>
                  <ListMusic className="w-5 h-5" /> <span className="text-[9px] font-bold uppercase tracking-widest">Ma Musique</span>
                </button>
              </nav>

              {/* CONTENU PRINCIPAL */}
              {searchQuery ? (
                <div className="pt-24 px-4 md:px-14 pb-24 relative z-30 min-h-screen">
                  <h2 className="text-xl md:text-2xl font-black text-white uppercase tracking-widest border-l-4 border-[#a855f7] pl-3">Résultats de recherche</h2>
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 mt-6">
                    {searchResults.length > 0 ? searchResults.map(album => (
                        <div key={album.id} className="relative cursor-pointer group" onClick={() => setSelectedAlbum(album)}>
                            <div className="rounded-2xl overflow-hidden shadow-lg border border-white/5 bg-[#151520] transition-transform duration-300 group-hover:scale-105 aspect-square">
                                <img className="object-cover w-full h-full" src={album.image} loading="lazy" draggable="false" alt=""/>
                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <div className="w-12 h-12 bg-[#a855f7] rounded-full flex items-center justify-center shadow-xl">
                                        <Play className="w-5 h-5 fill-white text-white ml-1" />
                                    </div>
                                </div>
                            </div>
                            <p className="text-white font-bold text-[11px] md:text-xs mt-3 truncate w-full">{album.name}</p>
                            <p className="text-white/50 text-[9px] md:text-[10px] truncate w-full">{album.artist}</p>
                        </div>
                    )) : <p className="text-white/50 py-10 col-span-full text-center">Aucun résultat trouvé dans la base de données musicale mondiale.</p>}
                  </div>
                </div>
              ) : currentCategory === 'watchlist' ? (
                <div className="pt-24 px-0 pb-24 min-h-screen">
                  <h2 className="text-xl md:text-2xl font-black text-white uppercase tracking-widest pl-4 md:pl-14 mb-6"><Bookmark className="w-6 h-6 text-[#a855f7] inline mr-2" /> Ma Musique</h2>
                  {watchlistData.length === 0 ? (
                    <div className="flex flex-col items-center justify-center py-32 opacity-50">
                        <ListMusic className="w-16 h-16 mb-4" />
                        <p className="text-sm uppercase tracking-widest font-bold">Votre bibliothèque est vide.</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 px-4 md:px-14">
                      {watchlistData.map(album => (
                        <div key={album.id} className="relative cursor-pointer group" onClick={() => setSelectedAlbum(album)}>
                            <div className="rounded-2xl overflow-hidden shadow-lg border border-white/5 bg-[#151520] transition-transform duration-300 group-hover:scale-105 aspect-square">
                                <img className="object-cover w-full h-full" src={album.image} loading="lazy" draggable="false" alt=""/>
                            </div>
                            <p className="text-white font-bold text-[11px] md:text-xs mt-3 truncate w-full">{album.name}</p>
                            <p className="text-white/50 text-[9px] md:text-[10px] truncate w-full">{album.artist}</p>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ) : (
                <>
                  {/* BANNIÈRE ET LIGNES */}
                  <MusicBanner onSelect={setSelectedAlbum} />
                  
                  <main className="relative z-20 space-y-10 mt-6 md:-mt-10">
                      {currentCategory === 'home' && (
                          <>
                              <MusicRow title="Hits du Moment" term="hits" onSelect={setSelectedAlbum} isLarge={true} />
                              <MusicRow title="Rap & Hip-Hop" term="rap français" onSelect={setSelectedAlbum} />
                              <MusicRow title="Pop Internationale" term="pop hits" onSelect={setSelectedAlbum} />
                              <MusicRow title="Afrobeats & R&B" term="afrobeat rnb" onSelect={setSelectedAlbum} />
                              <MusicRow title="Classiques" term="classique hits" onSelect={setSelectedAlbum} />
                          </>
                      )}
                      {currentCategory === 'playlists' && (
                          <>
                              <MusicRow title="Électro & Dance" term="electro house" onSelect={setSelectedAlbum} isLarge={true}/>
                              <MusicRow title="Détente & Lofi" term="lofi chill" onSelect={setSelectedAlbum} />
                              <MusicRow title="Rock & Alternatif" term="rock" onSelect={setSelectedAlbum} />
                              <MusicRow title="Acoustique" term="acoustic cover" onSelect={setSelectedAlbum} />
                          </>
                      )}
                  </main>
                </>
              )}

              {/* MODAL SETTINGS (Profil) */}
              {showSettings && (
                <div className="fixed inset-0 z-[9000] flex justify-center items-center p-4 sm:p-8 bg-[#060608]/95 backdrop-blur-3xl overflow-hidden">
                    <div className="holo-card relative w-full max-w-3xl rounded-[2rem] p-6 md:p-8 flex flex-col text-center animate-in zoom-in duration-300 z-10 shadow-[0_0_80px_rgba(0,0,0,0.9)] max-h-[95vh] overflow-y-auto no-scrollbar">
                        
                        <button onClick={() => setShowSettings(false)} className="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/5 hover:bg-red-500 flex items-center justify-center text-white/50 hover:text-white transition-colors shadow-sm z-20 outline-none">
                            <X className="w-5 h-5" />
                        </button>
                        
                        <div className="flex flex-col items-center mb-6">
                            <div className="w-20 h-20 md:w-24 md:h-24 rounded-full bg-[#151520] border-2 border-[#a855f7]/50 shadow-[0_0_20px_rgba(168,85,247,0.3)] overflow-hidden mb-4 flex items-center justify-center">
                                <span className="text-4xl font-black text-[#a855f7]">{userName ? userName.charAt(0).toUpperCase() : 'U'}</span>
                            </div>
                            <h2 className="text-2xl font-black text-white uppercase tracking-widest mb-1 drop-shadow-md">{userName || 'Utilisateur'}</h2>
                            
                            <div className="px-5 py-2 mt-2 bg-white/5 text-white/80 rounded-full text-[10px] font-bold uppercase tracking-widest border border-[#a855f7]/30 flex items-center gap-2 shadow-md">
                                <Star className="w-3 h-3 text-[#a855f7] fill-[#a855f7]" /> Écosystème LevelIA
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full text-left">
                            <div className="space-y-4">
                                <h3 className="text-[10px] font-black text-[#a855f7] uppercase tracking-widest pl-2 border-l-2 border-[#a855f7]">Préférences Musicales</h3>
                                
                                <div className="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/10 shadow-inner">
                                    <span className="text-[11px] font-bold text-white/80 uppercase tracking-widest flex items-center gap-3"><Headphones className="w-4 h-4 text-[#a855f7]" /> Qualité Audio</span>
                                    <span className="px-3 py-1 bg-white/10 text-white/70 rounded-lg text-[10px] font-black tracking-widest border border-white/10 uppercase">HQ (320kbps)</span>
                                </div>

                                <div className="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/10 shadow-inner">
                                    <span className="text-[11px] font-bold text-white/80 uppercase tracking-widest flex items-center gap-3"><Bookmark className="w-4 h-4 text-[#a855f7]" /> Albums Sauvegardés</span>
                                    <span className="px-3 py-1 bg-[#a855f7]/20 text-[#a855f7] rounded-lg text-xs font-bold border border-[#a855f7]/30">{watchlist.length}</span>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <h3 className="text-[10px] font-black text-[#a855f7] uppercase tracking-widest pl-2 border-l-2 border-[#a855f7]">Système</h3>
                                
                                <div className="flex justify-between items-center bg-white/5 p-4 rounded-xl border border-white/10 shadow-inner">
                                    <span className="text-[11px] font-bold text-white/80 uppercase tracking-widest flex items-center gap-3"><HardDrive className="w-4 h-4 text-[#a855f7]" /> Cache de Lecture</span>
                                    <button onClick={() => showToast("Cache musical nettoyé.", 'success')} className="px-3 py-1.5 bg-red-500/20 text-red-400 rounded-lg text-[10px] font-bold uppercase hover:bg-red-500 hover:text-white transition-all border border-red-500/30 outline-none">Vider</button>
                                </div>
                            </div>
                        </div>

                        <div className="w-full mt-8 pt-6 border-t border-white/10 text-center">
                            <span className="text-[10px] font-bold text-white/40 uppercase tracking-widest block mb-4">Moteur de données</span>
                            <div className="flex justify-center items-center gap-6 opacity-80 flex-wrap">
                                <span className="text-sm font-black tracking-widest text-[#fa243c]">Apple Music API</span>
                                <span className="text-sm font-black tracking-widest text-[#ff0000]">YouTube Data</span>
                            </div>
                        </div>
                        
                        {!showLogoutConfirm ? (
                            <button onClick={() => setShowLogoutConfirm(true)} className="w-full text-center px-4 py-4 mt-8 bg-red-500/10 text-[11px] font-bold text-red-400 uppercase tracking-widest hover:bg-red-500/20 border border-red-500/20 rounded-xl transition-colors flex justify-center items-center gap-3 active:scale-95 shadow-md outline-none">
                                <LogOut className="w-4 h-4" /> Se déconnecter de LevelMusic
                            </button>
                        ) : (
                            <div className="w-full mt-8 bg-red-500/10 border border-red-500/30 p-5 rounded-xl flex flex-col items-center animate-in zoom-in duration-300">
                                <p className="text-red-400 font-black text-xs uppercase tracking-widest mb-4">Êtes-vous sûr de vouloir quitter ?</p>
                                <div className="flex gap-4 w-full">
                                    <button onClick={() => setShowLogoutConfirm(false)} className="flex-1 py-3 bg-white/5 text-white/70 rounded-xl text-[10px] font-bold uppercase hover:bg-white/10 transition-colors outline-none">Annuler</button>
                                    <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="flex-1 py-3 bg-red-500 text-white rounded-xl text-[10px] font-bold uppercase shadow-[0_0_15px_rgba(239,68,68,0.4)] hover:bg-red-600 transition-colors outline-none">Confirmer</button>
                                </div>
                            </div>
                        )}
                        <p className="text-[9px] text-white/20 uppercase tracking-widest mt-6">LevelMusic • Architecture V1.0</p>
                    </div>
                </div>
              )}

              {/* MODALE ALBUM / PLAYLIST */}
              {selectedAlbum && (
                  <MusicModal 
                      item={selectedAlbum} 
                      onClose={() => setSelectedAlbum(null)} 
                      onPlay={(track, img) => setCurrentTrack({...track, coverArt: img})}
                      isAdded={watchlist.includes(selectedAlbum.id)}
                      toggleWatchlist={() => toggleWatchlist(selectedAlbum)}
                  />
              )}

              {/* LECTEUR AUDIO FIXE (La magie Youtube Invisible) */}
              <BottomPlayer track={currentTrack} onClose={() => setCurrentTrack(null)} />
            </div>
          );
        }

        // =========================================================================
        // COMPOSANTS API APPLE MUSIC / ITUNES (100% GRATUIT, SANS CLÉ)
        // =========================================================================

        function MusicBanner({ onSelect }) {
          const [hero, setHero] = useState(null);
          
          useEffect(() => {
              fetch('https://itunes.apple.com/search?term=album&entity=album&limit=25&country=FR')
              .then(r=>r.json())
              .then(data => {
                  if (data.results && data.results.length > 0) {
                      const randomAlbum = data.results[Math.floor(Math.random() * data.results.length)];
                      setHero({
                          id: randomAlbum.collectionId,
                          name: randomAlbum.collectionName,
                          artist: randomAlbum.artistName,
                          image: randomAlbum.artworkUrl100.replace('100x100bb', '1000x1000bb') 
                      });
                  }
              }).catch(()=>{});
          }, []);

          if (!hero) return <div className="h-[65vh] w-full bg-[#060608] animate-pulse"></div>;

          return (
            <header className="relative h-[60vh] md:h-[75vh] min-h-[450px] transition-all duration-700" style={{ backgroundSize: 'cover', backgroundPosition: 'center', backgroundImage: `url("${hero.image}")` }}>
                <div className="absolute inset-0 bg-gradient-to-r from-[#060608] via-[#060608]/80 to-transparent w-full md:w-[80%]"></div>
                <div className="absolute inset-0 bg-gradient-to-t from-[#060608] via-[#060608]/50 to-[#060608]/20"></div>
                
                <div className="relative z-10 flex flex-col justify-end h-full px-6 md:px-14 pb-16 max-w-4xl">
                    <span className="text-white/80 font-black tracking-[0.3em] text-[9px] md:text-[11px] uppercase bg-white/5 px-3 py-1 rounded-full border border-white/10 shadow-sm w-fit mb-4 flex items-center gap-2">
                        <Disc className="w-3 h-3 text-[#a855f7]" /> À la une
                    </span>
                    <h1 className="text-4xl md:text-6xl lg:text-7xl font-black text-white uppercase tracking-tighter mb-2 leading-tight drop-shadow-lg line-clamp-2">
                        {hero.name}
                    </h1>
                    <p className="text-lg md:text-xl text-white/70 font-medium mb-8">Par <span className="text-[#a855f7]">{hero.artist}</span></p>
                    
                    <button onClick={() => onSelect(hero)} className="w-fit flex items-center gap-3 px-8 py-4 bg-[#a855f7] text-white rounded-xl font-black uppercase tracking-widest hover:scale-105 transition-transform shadow-[0_0_30px_rgba(168,85,247,0.4)] outline-none">
                        <Headphones className="w-5 h-5" /> Écouter l'album
                    </button>
                </div>
            </header>
          );
        }

        function MusicRow({ title, term, onSelect, isLarge }) {
          const [items, setItems] = useState([]);
          const rowRef = useRef(null);

          useEffect(() => {
              fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(term)}&entity=album&limit=25&country=FR`)
              .then(r=>r.json())
              .then(data => {
                  const formatted = data.results.map(r => ({
                      id: r.collectionId,
                      name: r.collectionName,
                      artist: r.artistName,
                      image: r.artworkUrl100.replace('100x100bb', '600x600bb') 
                  }));
                  setItems(formatted);
              }).catch(()=>{});
          }, [term]);

          if (items.length === 0) return null;

          const scrollAction = (dir) => {
              if (rowRef.current) rowRef.current.scrollBy({ left: dir === 'left' ? -300 : 300, behavior: 'smooth' });
          }

          let isDown = false;
          let startX;
          let scrollLeft;
          const handleMouseDown = (e) => { isDown = true; startX = e.pageX - rowRef.current.offsetLeft; scrollLeft = rowRef.current.scrollLeft; };
          const handleMouseLeave = () => { isDown = false; };
          const handleMouseUp = () => { isDown = false; };
          const handleMouseMove = (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - rowRef.current.offsetLeft;
            rowRef.current.scrollLeft = scrollLeft - (x - startX) * 2;
          };

          return (
            <div className="group relative ml-4 md:ml-12">
                <h2 className="text-white/90 text-[13px] md:text-lg font-black mb-4 uppercase tracking-[0.2em] border-l-4 border-[#a855f7] pl-3 md:pl-4">{title}</h2>
                
                <div onClick={() => scrollAction('left')} className="absolute left-0 top-12 bottom-0 z-40 w-10 bg-gradient-to-r from-[#060608] via-[#060608]/80 to-transparent opacity-0 md:group-hover:opacity-100 flex items-center justify-start cursor-pointer transition-opacity duration-300 -ml-4 md:-ml-12 hidden md:flex outline-none">
                    <ChevronLeft className="text-white hover:text-[#a855f7] transition-colors w-10 h-10 ml-1 drop-shadow-lg" />
                </div>

                <div 
                  ref={rowRef} 
                  onMouseDown={handleMouseDown} onMouseLeave={handleMouseLeave} onMouseUp={handleMouseUp} onMouseMove={handleMouseMove}
                  className="flex overflow-x-scroll py-2 md:py-4 space-x-3 md:space-x-5 no-scrollbar cursor-grab active:cursor-grabbing pr-8"
                >
                    {items.map(item => {
                      const imgClass = isLarge ? 'w-[160px] md:w-[220px] h-[160px] md:h-[220px]' : 'w-[130px] md:w-[170px] h-[130px] md:h-[170px]';
                      return (
                          <div key={item.id} className="relative flex-none cursor-pointer group" onClick={() => onSelect(item)}>
                              <div className={`rounded-2xl overflow-hidden shadow-lg border border-white/5 bg-[#151520] transition-transform duration-300 group-hover:scale-105 ${imgClass}`}>
                                  <img className="object-cover w-full h-full" src={item.image} loading="lazy" draggable="false" alt=""/>
                                  <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                      <div className="w-12 h-12 bg-[#a855f7] rounded-full flex items-center justify-center shadow-xl">
                                          <Play className="w-5 h-5 fill-white text-white ml-1" />
                                      </div>
                                  </div>
                              </div>
                              <p className="text-white font-bold text-[11px] md:text-xs mt-3 truncate w-[130px] md:w-[170px]">{item.name}</p>
                              <p className="text-white/50 text-[9px] md:text-[10px] truncate w-[130px] md:w-[170px]">{item.artist}</p>
                          </div>
                      )
                    })}
                </div>

                <div onClick={() => scrollAction('right')} className="absolute right-0 top-12 bottom-0 z-40 w-12 bg-gradient-to-l from-[#060608] via-[#060608]/80 to-transparent opacity-0 md:group-hover:opacity-100 flex items-center justify-end cursor-pointer transition-opacity duration-300 hidden md:flex outline-none">
                    <ChevronRight className="text-white hover:text-[#a855f7] transition-colors w-10 h-10 mr-2 drop-shadow-lg" />
                </div>
            </div>
          )
        }

        // --- MODALE DES PISTES (TRACKLIST) ET INFOS ALBUM ---
        function MusicModal({ item, onClose, onPlay, isAdded, toggleWatchlist }) {
            const [tracks, setTracks] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const fetchTracks = async () => {
                    try {
                        const res = await fetch(`https://itunes.apple.com/lookup?id=${item.id}&entity=song&country=FR`);
                        const data = await res.json();
                        const songs = data.results.filter(r => r.wrapperType === 'track');
                        setTracks(songs);
                        setLoading(false);
                    } catch(e) { setLoading(false); }
                };
                fetchTracks();
            }, [item.id]);

            const formatDuration = (ms) => {
                if(!ms) return "0:00";
                const minutes = Math.floor(ms / 60000);
                const seconds = ((ms % 60000) / 1000).toFixed(0);
                return minutes + ":" + (seconds < 10 ? '0' : '') + seconds;
            };

            return (
                <div className="fixed inset-0 z-[8000] flex justify-center items-center p-0 md:p-6 bg-black/90 backdrop-blur-2xl">
                    <div className="holo-card relative w-full h-[100vh] md:h-[90vh] max-w-5xl md:rounded-[2rem] flex flex-col md:flex-row overflow-hidden shadow-2xl animate-in slide-in-from-bottom md:zoom-in">
                        <button onClick={onClose} className="absolute top-4 right-4 z-50 p-2 bg-black/50 hover:bg-red-500 rounded-full text-white transition-colors outline-none border border-white/10">
                            <X className="w-5 h-5" />
                        </button>

                        <div className="w-full md:w-2/5 bg-[#0a0a0f] p-8 flex flex-col items-center justify-center border-r border-white/5 relative">
                            {/* Flou artistique en arrière plan */}
                            <div className="absolute inset-0 opacity-20 blur-[60px]" style={{ backgroundImage: `url("${item.image}")`, backgroundSize: 'cover' }}></div>
                            
                            <img src={item.image} className="relative z-10 w-56 h-56 md:w-64 md:h-64 object-cover rounded-2xl shadow-[0_0_50px_rgba(168,85,247,0.3)] mb-6" draggable="false" alt=""/>
                            <h2 className="relative z-10 text-2xl font-black text-center uppercase tracking-widest">{item.name}</h2>
                            <p className="relative z-10 text-[#a855f7] font-bold mt-2 text-sm">{item.artist}</p>
                            
                            <div className="relative z-10 flex gap-4 mt-8 w-full">
                                <button onClick={toggleWatchlist} className={`flex-1 flex items-center justify-center gap-2 px-4 py-3 rounded-xl border transition-all active:scale-95 outline-none ${isAdded ? 'bg-green-500/10 border-green-500/30 text-green-400' : 'bg-white/5 border-white/20 text-white/80 hover:bg-white/10'}`}>
                                    {isAdded ? <CheckCircle className="w-5 h-5" /> : <Plus className="w-5 h-5" />}
                                    <span className="text-[10px] font-bold uppercase tracking-widest">{isAdded ? 'Sauvegardé' : 'Ajouter'}</span>
                                </button>
                                <button className="flex items-center justify-center px-4 py-3 rounded-xl border border-white/20 bg-white/5 text-white/80 hover:text-white hover:bg-white/10 transition-all active:scale-95 outline-none">
                                    <Share2 className="w-5 h-5 text-[#a855f7]" />
                                </button>
                            </div>
                        </div>

                        <div className="w-full md:w-3/5 p-6 md:p-8 overflow-y-auto no-scrollbar bg-black/40 pb-28">
                            <h3 className="text-lg font-black uppercase tracking-widest mb-6 flex items-center gap-2 border-b border-white/10 pb-4"><Disc className="w-5 h-5 text-[#a855f7]" /> Liste des titres</h3>
                            
                            {loading ? (
                                <div className="flex justify-center py-20"><div className="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-[#a855f7]"></div></div>
                            ) : (
                                <div className="space-y-2">
                                    {tracks.map((track, idx) => {
                                        return (
                                            <div key={track.trackId} onClick={() => onPlay({name: track.trackName, artist: track.artistName}, item.image)} className="flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 cursor-pointer group transition-all border border-transparent hover:border-white/5">
                                                <span className="w-6 text-center text-white/30 text-xs font-mono group-hover:hidden">{idx + 1}</span>
                                                <Play className="w-6 h-6 text-[#a855f7] hidden group-hover:block ml-1" />
                                                <div className="flex-1 min-w-0">
                                                    <p className="text-white font-bold text-[13px] truncate">{track.trackName}</p>
                                                    <p className="text-white/50 text-[10px] truncate">{track.artistName}</p>
                                                </div>
                                                <span className="text-white/40 text-[10px] font-mono">{formatDuration(track.trackTimeMillis)}</span>
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            )
        }

        // --- LECTEUR AUDIO SECRET (YOUTUBE INVISIBLE) ---
        function BottomPlayer({ track, onClose }) {
            if (!track) return null;
            
            const query = encodeURIComponent(`${track.artist} ${track.name} audio`);
            const ytUrl = `https://www.youtube.com/embed?listType=search&list=${query}&autoplay=1`;
            
            return (
                <div className="fixed bottom-[env(safe-area-inset-bottom)] md:bottom-0 left-0 w-full h-20 md:h-24 bg-[#0a0a0f]/95 backdrop-blur-2xl border-t border-[#a855f7]/30 flex items-center justify-between px-4 md:px-8 z-[9999] shadow-[0_-20px_50px_rgba(0,0,0,0.6)] animate-in slide-in-from-bottom">
                    
                    <div className="flex items-center gap-3 md:gap-4 w-[45%] md:w-1/3 overflow-hidden">
                        <img src={track.coverArt} className="w-12 h-12 md:w-16 md:h-16 rounded-xl shadow-lg border border-white/10" draggable="false" alt=""/>
                        <div className="truncate">
                            <p className="text-white font-black text-[11px] md:text-sm truncate drop-shadow-md">{track.name}</p>
                            <p className="text-white/60 text-[9px] md:text-xs truncate">{track.artist}</p>
                        </div>
                    </div>
                    
                    <div className="flex items-center justify-center gap-4 md:gap-8 w-[10%] md:w-1/3">
                        <button className="text-white/40 hover:text-[#a855f7] transition-colors hidden sm:block outline-none"><Rewind className="w-5 h-5 fill-current" /></button>
                        <div className="w-10 h-10 md:w-14 md:h-14 bg-gradient-to-tr from-[#8b5cf6] to-[#a855f7] rounded-full flex items-center justify-center shadow-[0_0_25px_rgba(168,85,247,0.5)] border border-white/20">
                            <div className="flex gap-1 items-end justify-center h-3 md:h-4">
                                <div className="w-0.5 md:w-1 bg-white rounded-full animate-[bounce_1s_infinite] h-full"></div>
                                <div className="w-0.5 md:w-1 bg-white rounded-full animate-[bounce_1.2s_infinite] h-2/3"></div>
                                <div className="w-0.5 md:w-1 bg-white rounded-full animate-[bounce_0.8s_infinite] h-4/5"></div>
                            </div>
                        </div>
                        <button className="text-white/40 hover:text-[#a855f7] transition-colors hidden sm:block outline-none"><FastForward className="w-5 h-5 fill-current" /></button>
                    </div>
                    
                    <div className="flex items-center justify-end w-[45%] md:w-1/3 gap-3 md:gap-4">
                         <span className="text-[#a855f7] font-bold text-[9px] md:text-[10px] uppercase tracking-widest hidden sm:block">Lecture en cours</span>
                         <button onClick={onClose} className="p-2 md:p-2.5 rounded-full bg-white/5 hover:bg-red-500 hover:text-white transition-colors border border-white/10 outline-none">
                             <X className="w-3 h-3 md:w-4 md:h-4" />
                         </button>
                    </div>

                    {/* L'iframe Youtube magique */}
                    <iframe src={ytUrl} className="hidden" allow="autoplay; encrypted-media"></iframe>
                </div>
            )
        }

        // Render
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
