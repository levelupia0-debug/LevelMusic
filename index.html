<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LevelMusic - L'Écosystème Premium</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
      }
    }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#060608] text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Play, Info, Search, X, ChevronLeft, ChevronRight, 
          Star, Key, LogOut, Shield, CheckCircle, AlertTriangle, 
          Home, Music, Disc, Headphones, FastForward, Rewind, Pause, 
          Bookmark, Plus, Share2, Filter, HardDrive, ListMusic, Cloud, ListPlus, ListOrdered, MoreVertical, Trash2
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, collectionGroup, getDocs, doc, setDoc, deleteDoc, collection, getDoc } from 'firebase/firestore';

        // --- NOUVEAU LOGO LEVEL MUSIC ---
        const LevelMusicLogo = ({ className = "w-6 h-6", color = "currentColor" }) => (
          <Music className={className} color={color} />
        );

        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
          apiKey: "AIzaSyA3JgvNu5p-43037jvm4WRDaJHI9ES7uGM",
          authDomain: "levelup-ia.firebaseapp.com",
          projectId: "levelup-ia",
          storageBucket: "levelup-ia.firebasestorage.app",
          messagingSenderId: "229420004282",
          appId: "1:229420004282:web:6735f059a947f0936ae383",
          measurementId: "G-MSRDY2574K"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "level-ia-premium";

        // --- STYLES GLOBAUX ---
        const globalStyles = `
          @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap');
          
          * { user-select: none; -webkit-user-select: none; scrollbar-width: none; }
          input, textarea { user-select: auto; -webkit-user-select: auto; }
          body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #060608; overflow-x: hidden; -webkit-tap-highlight-color: transparent; padding-bottom: env(safe-area-inset-bottom); padding-top: env(safe-area-inset-top); }
          ::-webkit-scrollbar { display: none; }
          .bg-main { background: radial-gradient(circle at 50% 0%, #1a1025 0%, #060608 80%); min-height: 100vh; }
          .holo-card { background: linear-gradient(135deg, rgba(30,20,45,0.6) 0%, rgba(10,10,15,0.8) 100%); border: 1px solid rgba(168,85,247,0.2); box-shadow: inset 0 0 30px rgba(168,85,247,0.05), 0 30px 60px rgba(0,0,0,0.8); backdrop-filter: blur(30px); }
          
          .splash-text { opacity: 0; position: absolute; transform: scale(0.85); filter: blur(15px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); text-align: center; }
          .splash-text.active { opacity: 1; transform: scale(1); filter: blur(0px); }
          .splash-text.exit { opacity: 0; transform: scale(1.2); filter: blur(30px); }

          /* Custom Range Slider */
          input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 8px; height: 4px; outline: none; }
          input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #a855f7; cursor: pointer; box-shadow: 0 0 10px rgba(168,85,247,0.8); transition: transform 0.1s; }
          input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }
        `;

        function App() {
          const [user, setUser] = useState(null);
          const [userName, setUserName] = useState('');
          const [accessKey, setAccessKey] = useState('');
          const [authError, setAuthError] = useState('');
          const [isLoadingAuth, setIsLoadingAuth] = useState(false);
          const [isScrolled, setIsScrolled] = useState(false);
          
          const [showSplash, setShowSplash] = useState(true);
          const [splashStep, setSplashStep] = useState(0);

          const [currentCategory, setCurrentCategory] = useState('home');
          const [selectedAlbum, setSelectedAlbum] = useState(null);
          const [showSettings, setShowSettings] = useState(false);
          const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
          const [toasts, setToasts] = useState([]);

          const [searchQuery, setSearchQuery] = useState('');
          const [searchResults, setSearchResults] = useState([]);

          // État du Lecteur Global
          const [currentTrack, setCurrentTrack] = useState(null); 
          const [queue, setQueue] = useState([]);
          const [queueIndex, setQueueIndex] = useState(0);

          // Playlists Personnalisées
          const [userPlaylists, setUserPlaylists] = useState([]);
          const [showPlaylistCreator, setShowPlaylistCreator] = useState(false);

          useEffect(() => {
            signInAnonymously(auth).catch(console.error);
            const savedKey = localStorage.getItem('levelmovie_saved_key');
            const savedName = localStorage.getItem('levelmovie_user_name');
            const savedUid = localStorage.getItem('levelmovie_user_uid');
            
            if (savedKey && savedUid) {
              setUser({ uid: savedUid });
              if (savedName) setUserName(savedName);
            }

            const t1 = setTimeout(() => setSplashStep(1), 200);   
            const t2 = setTimeout(() => setSplashStep(2), 1400);  
            const t3 = setTimeout(() => setSplashStep(3), 2800);  
            const t4 = setTimeout(() => { setSplashStep(4); setShowSplash(false); }, 3200);

            const handleScroll = () => setIsScrolled(window.scrollY > 30);
            window.addEventListener('scroll', handleScroll);
            return () => {
                clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4);
                window.removeEventListener('scroll', handleScroll);
            }
          }, []);

          // --- FETCH PLAYLISTS FIREBASE ---
          useEffect(() => {
              if (!user) return;
              const fetchCustomPlaylists = async () => {
                  try {
                      const q = collection(db, "artifacts", APP_ID, "users", user.uid, "custom_playlists");
                      const snaps = await getDocs(q);
                      const data = [];
                      snaps.forEach(doc => data.push(doc.data()));
                      setUserPlaylists(data);
                  } catch (e) { console.error(e); }
              };
              fetchCustomPlaylists();
          }, [user]);

          // --- RECHERCHE HYBRIDE (ALBUMS ET MUSIQUES) ---
          useEffect(() => {
            if (searchQuery.trim() === '') {
              setSearchResults([]);
              return;
            }
            const delayDebounceFn = setTimeout(async () => {
              try {
                // Recherche les musiques directement
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchQuery)}&entity=song&limit=30&country=FR`);
                const data = await res.json();
                const formatted = data.results.map(r => ({
                    id: r.trackId,
                    name: r.trackName,
                    artist: r.artistName,
                    image: r.artworkUrl100.replace('100x100bb', '600x600bb'),
                    type: 'song'
                }));
                setSearchResults(formatted);
              } catch (e) {}
            }, 500);
            return () => clearTimeout(delayDebounceFn);
          }, [searchQuery]);

          const showToast = useCallback((msg, type = 'info') => {
            const id = Date.now() + Math.random();
            setToasts(prev => [...prev, { id, msg, type }]);
            setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
          }, []);

          // --- GESTION DES PLAYLISTS ---
          const createPlaylist = async (name) => {
              if(!user || !name.trim()) return;
              const newPl = { id: Date.now().toString(), name: name, tracks: [], createdAt: Date.now() };
              const updated = [...userPlaylists, newPl];
              setUserPlaylists(updated);
              setShowPlaylistCreator(false);
              showToast("Playlist créée !", "success");
              try {
                  await setDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "custom_playlists", newPl.id), newPl);
              } catch(e) {}
          };

          const addTrackToPlaylist = async (playlistId, track) => {
              if(!user) return;
              const plIndex = userPlaylists.findIndex(p => p.id === playlistId);
              if(plIndex === -1) return;
              
              const updatedPl = { ...userPlaylists[plIndex] };
              if(!updatedPl.tracks.find(t => t.id === track.id)) {
                  updatedPl.tracks.push(track);
                  const newLists = [...userPlaylists];
                  newLists[plIndex] = updatedPl;
                  setUserPlaylists(newLists);
                  showToast("Ajouté à la playlist", "success");
                  try {
                      await setDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "custom_playlists", playlistId), updatedPl);
                  } catch(e) {}
              } else {
                  showToast("Déjà dans la playlist", "error");
              }
          };

          const deletePlaylist = async (playlistId) => {
              if(!user) return;
              const newLists = userPlaylists.filter(p => p.id !== playlistId);
              setUserPlaylists(newLists);
              showToast("Playlist supprimée", "success");
              try {
                  await deleteDoc(doc(db, "artifacts", APP_ID, "users", user.uid, "custom_playlists", playlistId));
              } catch(e) {}
          };

          // --- GESTION DE LA FILE D'ATTENTE (QUEUE) ---
          const handlePlayTrack = (track, newQueue = null, index = 0) => {
              setCurrentTrack(track);
              if (newQueue) {
                  setQueue(newQueue);
                  setQueueIndex(index);
              } else {
                  setQueue([track]);
                  setQueueIndex(0);
              }
          };

          const handleNextTrack = () => {
              if (queueIndex < queue.length - 1) {
                  setQueueIndex(queueIndex + 1);
                  setCurrentTrack(queue[queueIndex + 1]);
              }
          };

          const handlePrevTrack = () => {
              if (queueIndex > 0) {
                  setQueueIndex(queueIndex - 1);
                  setCurrentTrack(queue[queueIndex - 1]);
              }
          };

          const handleNavCategory = (cat) => {
            setCurrentCategory(cat);
            setSearchQuery('');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const formatAccessKey = (val) => {
            let formatted = val.toUpperCase().replace(/[^A-Z0-9-]/g, '');
            setAccessKey(formatted.substring(0, 16));
          };

          const handleLogin = async () => {
            if (!accessKey) return;
            setIsLoadingAuth(true);
            setAuthError('');
            try {
              const q = collectionGroup(db, 'security');
              const querySnapshot = await getDocs(q);
              let foundUserData = null;
              querySnapshot.forEach(docSnap => {
                if (docSnap.data().key === accessKey) foundUserData = docSnap.data();
              });
              
              if (foundUserData) {
                const uid = foundUserData.uid || accessKey;
                const name = foundUserData.name || foundUserData.displayName || "Utilisateur";
                setUser({ uid });
                setUserName(name);
                localStorage.setItem('levelmovie_saved_key', accessKey);
                localStorage.setItem('levelmovie_user_name', name);
                localStorage.setItem('levelmovie_user_uid', uid);
              } else {
                setAuthError("Clé invalide.");
              }
            } catch (error) {
              setAuthError("Erreur serveur.");
            }
            setIsLoadingAuth(false);
          };

          if (showSplash) {
            return (
              <div className={`fixed inset-0 z-[9999] bg-[#060608] flex items-center justify-center flex-col transition-opacity duration-500 ${splashStep === 3 ? 'opacity-0' : 'opacity-100'}`}>
                <style>{globalStyles}</style>
                <div className={`splash-text flex flex-col items-center ${splashStep === 1 ? 'active' : ''} ${splashStep >= 2 ? 'exit' : ''}`}>
                   <div className="w-20 h-20 bg-gradient-to-tr from-[#8b5cf6] to-[#a855f7] rounded-full flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(168,85,247,0.5)]">
                      <Music className="w-10 h-10 text-white" />
                   </div>
                   <div className="text-4xl font-black tracking-widest">
                     <span className="text-white">Level</span><span className="text-[#a855f7]">Music</span>
                   </div>
                </div>
                <div className={`splash-text flex flex-col items-center justify-center ${splashStep === 2 ? 'active' : ''} ${splashStep >= 3 ? 'exit' : ''}`}>
                   <span className="text-white font-black tracking-[0.6em] text-2xl uppercase">LevelUp</span>
                   <span className="text-[10px] font-bold tracking-[0.5em] text-[#a855f7] mt-4 uppercase">Le Catalogue Mondial</span>
                </div>
              </div>
            );
          }

          if (!user) {
            return (
              <div className="bg-main flex items-center justify-center p-4 sm:p-8 fixed inset-0 z-[5000]">
                <style>{globalStyles}</style>
                <div className="w-full max-w-sm text-center py-4 relative glass p-8 rounded-[2rem] border border-white/5 shadow-[0_0_50px_rgba(168,85,247,0.15)] bg-black/40 backdrop-blur-xl">
                  <LevelMusicLogo className="w-12 h-12 text-[#a855f7] mx-auto mb-4" />
                  <h1 className="text-3xl font-black tracking-widest mb-10 drop-shadow-md">
                    <span className="text-white">Level</span><span className="text-[#a855f7]">Music</span>
                  </h1>
                  <div className="space-y-6">
                    <p className="text-[11px] font-bold text-[#a855f7] uppercase tracking-[0.1em] mb-2 flex items-center justify-center gap-2">
                      <Shield className="w-4 h-4" /> Clé d'Accès requise
                    </p>
                    <input 
                      type="text" value={accessKey} onChange={(e) => formatAccessKey(e.target.value)}
                      placeholder="LVL-XXXXX-XXXXX" 
                      className="w-full bg-[#030305] border border-[#a855f7]/40 rounded-xl py-4 px-5 text-center text-white font-mono text-base tracking-widest outline-none focus:border-[#a855f7] transition-all uppercase"
                    />
                    <button 
                      onClick={handleLogin} disabled={isLoadingAuth}
                      className="w-full bg-gradient-to-r from-[#8b5cf6] to-[#a855f7] text-white py-4 rounded-xl font-black text-[12px] uppercase tracking-[0.1em] hover:opacity-90 active:scale-95 shadow-[0_0_25px_rgba(168,85,247,0.4)] disabled:opacity-50 outline-none"
                    >
                      {isLoadingAuth ? "Vérification..." : "Connexion"}
                    </button>
                    {authError && <p className="text-[12px] text-red-400 font-bold mt-2">{authError}</p>}
                  </div>
                </div>
              </div>
            );
          }

          const EXTENDED_GENRES = [
              { title: "Drill & Trap", term: "drill trap uk" },
              { title: "Rap US", term: "rap us hiphop" },
              { title: "R&B 90s & Soul", term: "rnb soul 90s" },
              { title: "Pop Hits & Top 50", term: "pop hits top" },
              { title: "K-Pop", term: "kpop bts blackpink" },
              { title: "Afrobeat & Amapiano", term: "afrobeat amapiano" },
              { title: "Latino & Reggaeton", term: "reggaeton latino" },
              { title: "Électro, House & Techno", term: "electro house techno" },
              { title: "Lo-Fi & Chillhop", term: "lofi chillhop study" },
              { title: "Rock, Punk & Metal", term: "rock metal punk" },
              { title: "Jazz & Blues", term: "jazz blues classic" },
              { title: "Reggae & Dancehall", term: "reggae dancehall jamaica" },
              { title: "Musique Classique", term: "classical piano mozart" },
              { title: "Variété Française", term: "chanson francaise variete" }
          ];

          return (
            <div className="bg-main text-white min-h-screen pb-32">
              <style>{globalStyles}</style>

              {/* TOASTS */}
              <div className="fixed top-4 right-4 md:top-6 md:right-6 z-[9999] flex flex-col gap-3 pointer-events-none items-end">
                {toasts.map(toast => {
                  let icon = <CheckCircle className="w-5 h-5 text-[#a855f7]" />;
                  let colorClass = 'border-[#a855f7]/30 bg-[#0a0a0f]/95 text-white';
                  if (toast.type === 'error') {
                    icon = <AlertTriangle className="w-5 h-5 text-red-400" />;
                    colorClass = 'border-red-500/30 bg-[#0a0a0f]/95 text-red-50';
                  }
                  return (
                    <div key={toast.id} className={`flex items-center gap-4 p-4 rounded-2xl backdrop-blur-3xl border shadow-2xl transition-all duration-500 animate-in slide-in-from-right fade-in ${colorClass} min-w-[280px] pointer-events-auto`}>
                      {icon} <span className="text-[12px] font-bold tracking-wide">{toast.msg}</span>
                    </div>
                  );
                })}
              </div>

              {/* HEADER */}
              <header className={`fixed top-0 w-full z-50 transition-all duration-500 flex items-center justify-between px-4 md:px-10 py-3 md:py-4 ${isScrolled ? 'bg-black/80 backdrop-blur-2xl border-b border-white/5 shadow-xl' : 'bg-gradient-to-b from-[#060608] via-[#060608]/90 to-transparent'}`}>
                <div className="flex items-center space-x-6 md:space-x-10">
                  <div className="flex items-center gap-3 cursor-pointer outline-none" onClick={() => handleNavCategory('home')}>
                    <h1 className="text-xl md:text-2xl font-black tracking-widest leading-none drop-shadow-lg flex items-center gap-2">
                      <LevelMusicLogo className="w-6 h-6 text-[#a855f7] sm:hidden" />
                      <span className="hidden sm:inline"><span className="text-white">Level</span><span className="text-[#a855f7]">Music</span></span>
                    </h1>
                  </div>
                  
                  <nav className="hidden lg:flex space-x-6 text-[12px] font-bold uppercase tracking-widest text-white/60">
                    <button onClick={() => handleNavCategory('home')} className={`hover:text-white outline-none transition-colors ${currentCategory === 'home' ? 'text-[#a855f7]' : ''}`}>Découvrir</button>
                    <button onClick={() => handleNavCategory('playlists')} className={`hover:text-white outline-none transition-colors ${currentCategory === 'playlists' ? 'text-[#a855f7]' : ''}`}>Genres</button>
                    <button onClick={() => handleNavCategory('watchlist')} className={`hover:text-white outline-none transition-colors ${currentCategory === 'watchlist' ? 'text-[#a855f7]' : ''}`}>Bibliothèque</button>
                  </nav>
                </div>
                
                <div className="flex items-center space-x-3 md:space-x-6">
                  {/* BARRE DE RECHERCHE */}
                  <div className="flex items-center relative">
                    <input 
                      type="text" 
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      placeholder="Artistes, sons, albums..." 
                      className="bg-[#151520] border border-white/10 text-white text-xs px-4 py-2 rounded-full outline-none w-36 md:w-64 focus:border-[#a855f7] transition-colors shadow-inner"
                    />
                  </div>
                  
                  {/* PROFIL */}
                  <div className="flex items-center gap-3 p-1.5 pr-3 md:pr-4 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-all cursor-pointer shadow-md outline-none" onClick={() => setShowSettings(true)}>
                    <div className="w-8 h-8 md:w-9 md:h-9 rounded-full bg-[#151520] flex items-center justify-center overflow-hidden border border-[#a855f7]/40 shadow-inner shrink-0">
                      <span className="text-[12px] md:text-[13px] font-black text-[#a855f7]">{userName ? userName.charAt(0).toUpperCase() : 'U'}</span>
                    </div>
                    <div className="hidden md:block min-w-0">
                      <p className="text-[12px] font-bold uppercase truncate tracking-wide text-white/90">{userName || 'Utilisateur'}</p>
                    </div>
                  </div>
                </div>
              </header>

              {/* NAVBAR MOBILE */}
              <nav className="lg:hidden fixed bottom-0 w-full z-40 bg-[#060608]/95 backdrop-blur-xl border-t border-white/5 flex justify-around items-center py-3 shadow-[0_-10px_20px_rgba(0,0,0,0.5)] pb-[env(safe-area-inset-bottom)]">
                <button onClick={() => handleNavCategory('home')} className={`flex flex-col items-center gap-1 outline-none transition-colors ${currentCategory === 'home' ? 'text-[#a855f7]' : 'text-white/50 hover:text-white'}`}>
                  <Home className="w-5 h-5" /> <span className="text-[9px] font-bold uppercase tracking-widest">Accueil</span>
                </button>
                <button onClick={() => handleNavCategory('playlists')} className={`flex flex-col items-center gap-1 outline-none transition-colors ${currentCategory === 'playlists' ? 'text-[#a855f7]' : 'text-white/50 hover:text-white'}`}>
                  <Disc className="w-5 h-5" /> <span className="text-[9px] font-bold uppercase tracking-widest">Genres</span>
                </button>
                <button onClick={() => handleNavCategory('watchlist')} className={`flex flex-col items-center gap-1 outline-none transition-colors ${currentCategory === 'watchlist' ? 'text-[#a855f7]' : 'text-white/50 hover:text-white'}`}>
                  <ListMusic className="w-5 h-5" /> <span className="text-[9px] font-bold uppercase tracking-widest">Biblio</span>
                </button>
              </nav>

              {/* CONTENU PRINCIPAL */}
              {searchQuery ? (
                <div className="pt-24 px-4 md:px-14 pb-24 relative z-30 min-h-screen">
                  <h2 className="text-xl md:text-2xl font-black text-white uppercase tracking-widest border-l-4 border-[#a855f7] pl-3">Recherche Mondiale</h2>
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 mt-6">
                    {searchResults.length > 0 ? searchResults.map(track => (
                        <div key={track.id} className="relative cursor-pointer group" onClick={() => handlePlayTrack(track)}>
                            <div className="rounded-2xl overflow-hidden shadow-lg border border-white/5 bg-[#151520] transition-transform duration-300 group-hover:scale-105 aspect-square">
                                <img className="object-cover w-full h-full" src={track.image} loading="lazy" draggable="false" alt=""/>
                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                    <div className="w-12 h-12 bg-[#a855f7] rounded-full flex items-center justify-center shadow-xl">
                                        <Play className="w-5 h-5 fill-white text-white ml-1" />
                                    </div>
                                </div>
                            </div>
                            <p className="text-white font-bold text-[11px] md:text-xs mt-3 truncate w-full">{track.name}</p>
                            <p className="text-white/50 text-[9px] md:text-[10px] truncate w-full">{track.artist}</p>
                        </div>
                    )) : <p className="text-white/50 py-10 col-span-full text-center">Aucun résultat trouvé sur YouTube / iTunes.</p>}
                  </div>
                </div>
              ) : currentCategory === 'watchlist' ? (
                <div className="pt-24 px-4 md:px-14 pb-24 min-h-screen max-w-7xl mx-auto">
                  <div className="flex justify-between items-end mb-8">
                      <h2 className="text-xl md:text-3xl font-black text-white uppercase tracking-widest"><Bookmark className="w-8 h-8 text-[#a855f7] inline mr-2" /> Ma Bibliothèque</h2>
                      <button onClick={() => setShowPlaylistCreator(true)} className="px-5 py-2.5 bg-[#a855f7] text-white rounded-xl font-bold text-xs uppercase tracking-widest hover:scale-105 transition-all shadow-[0_0_20px_rgba(168,85,247,0.4)] flex items-center gap-2">
                          <Plus className="w-4 h-4" /> Nouvelle Playlist
                      </button>
                  </div>

                  {userPlaylists.length > 0 && (
                      <div className="mb-12">

                                <div className="space-y-2">
                                    {tracks.map((track, idx) => {
                                        const isMenuOpen = activeMenu === track.trackId;
                                        return (
                                            <div key={track.trackId} className="relative flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 group transition-all border border-transparent hover:border-white/5">
                                                <div className="w-8 flex justify-center cursor-pointer" onClick={() => {
                                                    const queueList = tracks.map(t => ({ id: t.trackId, name: t.trackName, artist: t.artistName, coverArt: t.coverArt || item.image }));
                                                    onPlay(queueList[idx], queueList, idx);
                                                }}>
                                                    <span className="text-white/30 text-xs font-mono group-hover:hidden">{idx + 1}</span>
                                                    <Play className="w-5 h-5 text-[#a855f7] hidden group-hover:block" />
                                                </div>
                                                <div className="flex-1 min-w-0 cursor-pointer" onClick={() => {
                                                    const queueList = tracks.map(t => ({ id: t.trackId, name: t.trackName, artist: t.artistName, coverArt: t.coverArt || item.image }));
                                                    onPlay(queueList[idx], queueList, idx);
                                                }}>
                                                    <p className="text-white font-bold text-[13px] truncate">{track.trackName}</p>
                                                    <p className="text-white/50 text-[10px] truncate">{track.artistName}</p>
                                                </div>
                                                <span className="text-white/40 text-[10px] font-mono mr-2">{formatDuration(track.trackTimeMillis)}</span>
                                                
                                                {userPlaylists && (
                                                    <button onClick={(e) => { e.stopPropagation(); setActiveMenu(isMenuOpen ? null : track.trackId); }} className="p-1 opacity-0 group-hover:opacity-100 hover:text-white text-white/50 transition-all outline-none relative z-10">
                                                        <MoreVertical className="w-4 h-4" />
                                                    </button>
                                                )}

                                                {isMenuOpen && (
                                                    <div className="absolute right-10 top-8 w-48 bg-[#151520] border border-white/10 rounded-xl shadow-2xl z-50 overflow-hidden animate-in zoom-in p-1">
                                                        <div className="px-3 py-2 border-b border-white/10 text-[10px] font-black uppercase tracking-widest text-white/40">Ajouter à...</div>
                                                        {userPlaylists.length === 0 && <div className="px-3 py-3 text-xs text-white/50 text-center">Aucune playlist</div>}
                                                        {userPlaylists.map(pl => (
                                                            <div key={pl.id} onClick={(e) => { e.stopPropagation(); onAddToPlaylist(pl.id, {id: track.trackId, name: track.trackName, artist: track.artistName, coverArt: track.coverArt || item.image}); setActiveMenu(null); }} className="px-3 py-2.5 text-xs text-white hover:bg-[#a855f7] hover:text-white cursor-pointer rounded-lg transition-colors truncate">
                                                                {pl.name}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            )
        }

        // =========================================================================
        // LECTEUR AUDIO VRAI MOTEUR (YouTube Iframe API + Progression) - CORRIGÉ
        // =========================================================================
        function AudioEngine({ track, queue, queueIndex, onNext, onPrev, onClose }) {
            const playerRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [duration, setDuration] = useState(0);
            const [currentTime, setCurrentTime] = useState(0);
            const [isReady, setIsReady] = useState(false);

            const onNextRef = useRef(onNext);
            useEffect(() => { onNextRef.current = onNext; }, [onNext]);

            useEffect(() => {
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);
                    window.onYouTubeIframeAPIReady = initPlayer;
                } else if (!playerRef.current) {
                    initPlayer();
                }

                function initPlayer() {
                    // On s'assure que le conteneur existe
                    if (document.getElementById('yt-player-container')) {
                        playerRef.current = new window.YT.Player('yt-player-container', {
                            height: '1', width: '1',
                            playerVars: { autoplay: 1, controls: 0, playsinline: 1, rel: 0, modestbranding: 1 },
                            events: {
                                onReady: () => setIsReady(true),
                                onStateChange: (event) => {
                                    if (event.data === window.YT.PlayerState.PLAYING) {
                                        setIsPlaying(true);
                                        if (playerRef.current && playerRef.current.getDuration) {
                                            setDuration(playerRef.current.getDuration());
                                        }
                                    } else if (event.data === window.YT.PlayerState.PAUSED) {
                                        setIsPlaying(false);
                                    } else if (event.data === window.YT.PlayerState.ENDED) {
                                        setIsPlaying(false);
                                        if (onNextRef.current) onNextRef.current();
                                    }
                                },
                                onError: () => {
                                    if (onNextRef.current) onNextRef.current();
                                }
                            }
                        });
                    }
                }
            }, []);

            useEffect(() => {
                if (isReady && track && playerRef.current && playerRef.current.loadPlaylist) {
                    const query = `${track.artist} ${track.name} official audio`;
                    playerRef.current.loadPlaylist({list: query, listType: 'search'});
                    setIsPlaying(true);
                    setProgress(0);
                    setCurrentTime(0);
                }
            }, [track, isReady]);

            useEffect(() => {
                let interval;
                if (isPlaying) {
                    interval = setInterval(() => {
                        if (playerRef.current && playerRef.current.getCurrentTime) {
                            const time = playerRef.current.getCurrentTime();
                            const dur = playerRef.current.getDuration() || 1;
                            setCurrentTime(time);
                            setProgress((time / dur) * 100);
                        }
                    }, 500);
                }
                return () => clearInterval(interval);
            }, [isPlaying]);

            const togglePlay = () => {
                if (!isReady || !playerRef.current) return;
                if (isPlaying) { playerRef.current.pauseVideo(); }
                else { playerRef.current.playVideo(); }
            };

            const handleSeek = (e) => {
                const newPercent = parseFloat(e.target.value);
                setProgress(newPercent);
                if (playerRef.current && duration > 0 && playerRef.current.seekTo) {
                    const newTime = (newPercent / 100) * duration;
                    playerRef.current.seekTo(newTime, true);
                    setCurrentTime(newTime);
                }
            };

            const formatTime = (seconds) => {
                if (!seconds || isNaN(seconds)) return "0:00";
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            return (
                <div className={track ? "fixed bottom-[env(safe-area-inset-bottom)] md:bottom-0 left-0 w-full bg-[#0a0a0f]/95 backdrop-blur-3xl border-t border-[#a855f7]/30 z-[9999] shadow-[0_-20px_50px_rgba(0,0,0,0.8)] animate-in slide-in-from-bottom pb-2 pt-2 md:pb-0 md:pt-0" : "hidden"}>
                    
                    {/* LE LECTEUR CACHÉ ISOLÉ */}
                    <div style={{position: 'absolute', opacity: 0, pointerEvents: 'none', width: '1px', height: '1px'}} dangerouslySetInnerHTML={{ __html: '<div id="yt-player-container"></div>' }}></div>

                    {track && (
                        <>
                            <div className="absolute top-0 left-0 w-full h-1 bg-white/10 md:hidden">
                                 <div className="h-full bg-[#a855f7] transition-all" style={{width: `${progress}%`}}></div>
                            </div>

                            <div className="flex items-center justify-between px-4 md:px-8 h-20 md:h-24">
                                <div className="flex items-center gap-3 md:gap-4 w-1/3 overflow-hidden">
                                    <img src={track.coverArt || "https://via.placeholder.com/150"} className="w-12 h-12 md:w-16 md:h-16 rounded-xl shadow-[0_0_15px_rgba(0,0,0,0.5)] border border-white/10" draggable="false" alt=""/>
                                    <div className="truncate hidden sm:block">
                                        <p className="text-white font-black text-xs md:text-sm truncate drop-shadow-md">{track.name}</p>
                                        <p className="text-white/60 text-[10px] md:text-xs truncate">{track.artist}</p>
                                    </div>
                                </div>
                                
                                <div className="flex flex-col items-center justify-center w-1/3 max-w-[400px]">
                                    <div className="flex items-center justify-center gap-6 mb-2">
                                        <button onClick={onPrev} className={`text-white/60 hover:text-white transition-colors outline-none ${queueIndex === 0 ? 'opacity-30 cursor-not-allowed' : ''}`} disabled={queueIndex === 0}>
                                            <Rewind className="w-5 h-5 fill-current" />
                                        </button>
                                        
                                        <button onClick={togglePlay} className="w-12 h-12 md:w-14 md:h-14 bg-white rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:scale-105 transition-transform outline-none">
                                            {isPlaying ? <Pause className="w-6 h-6 fill-black text-black" /> : <Play className="w-6 h-6 fill-black text-black ml-1" />}
                                        </button>
                                        
                                        <button onClick={onNext} className={`text-white/60 hover:text-white transition-colors outline-none ${queueIndex === queue?.length - 1 ? 'opacity-30 cursor-not-allowed' : ''}`} disabled={queueIndex === queue?.length - 1}>
                                            <FastForward className="w-5 h-5 fill-current" />
                                        </button>
                                    </div>
                                    
                                    <div className="hidden md:flex w-full items-center gap-3">
                                        <span className="text-[10px] font-mono text-white/50 w-8 text-right">{formatTime(currentTime)}</span>
                                        <input 
                                            type="range" min="0" max="100" value={progress || 0} onChange={handleSeek}
                                            className="flex-1"
                                        />
                                        <span className="text-[10px] font-mono text-white/50 w-8">{formatTime(duration)}</span>
                                    </div>
                                </div>
                                
                                <div className="flex items-center justify-end w-1/3 gap-3 md:gap-4">
                                     <div className="hidden lg:flex items-center gap-2 mr-4 text-xs font-bold text-white/40 uppercase tracking-widest border border-white/10 px-3 py-1.5 rounded-lg bg-black/50">
                                         <ListOrdered className="w-4 h-4 text-[#a855f7]" /> {queueIndex + 1} / {queue?.length || 1}
                                     </div>
                                     <button onClick={() => { onClose(); setIsPlaying(false); if(playerRef.current && playerRef.current.stopVideo) playerRef.current.stopVideo(); }} className="p-2 md:p-2.5 rounded-full bg-white/5 hover:bg-red-500 hover:text-white transition-colors border border-white/10 outline-none">
                                         <X className="w-4 h-4" />
                                     </button>
                                </div>
                            </div>
                        </>
                    )}
                </div>
            )
        }

        // Render
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
