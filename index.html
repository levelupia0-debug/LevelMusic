<style>
  :root {
    --accent: #3B82F6;

  @keyframes splash-logo {

  @keyframes spin-ring { to { transform: rotate(360deg); } }

  @keyframes slide-up {
    from { transform: translateY(100%); opacity: 0; }

    to { opacity: 1; transform: translateY(0); }

  .scroll-y { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .scroll-x { overflow-x: auto; -webkit-overflow-scrolling: touch; display: flex; }

  /* PROGRESS BAR */
  .progress-track {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
    touch-action: none;
  }
  .progress-fill {
    height: 100%; background: white;
    border-radius: 2px;
    position: relative;
    transition: width 0.1s linear;
  }
  .progress-thumb {
    position: absolute; right: -6px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    background: white; border-radius: 50%;
    opacity: 0; transition: opacity 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .progress-track:hover .progress-thumb,
  .progress-track.dragging .progress-thumb { opacity: 1; }
  .progress-track:hover .progress-fill { background: var(--accent); }

  /* RANGE INPUT */
  input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; outline: none; }
  input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border-radius: 50%; margin-top: -6px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

  /* GLASSMORPHISM */
  .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .glass-dark { background: rgba(10,10,10,0.9); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }

  /* ALBUM SCALE */
  @keyframes album-bounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }
  .album-playing { animation: album-bounce 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; transform: scale(1.04); }
  .album-paused { transform: scale(1); transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); }

  /* TOAST */
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(10px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .toast-anim { animation: toast-in 0.25s ease forwards; }

  /* BOTTOM SHEET */
  @keyframes sheet-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-up { animation: sheet-up 0.32s cubic-bezier(0.4,0,0.2,1) forwards; }

  /* CARD HOVER */
  .card-hover { transition: transform 0.15s ease, background 0.15s ease; }
  .card-hover:active { transform: scale(0.96); }

  /* NAV */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: calc(var(--nav-h) + var(--safe-bottom));
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; align-items: flex-start; justify-content: space-around;
    padding-top: 10px;
    z-index: 200;
  }

  /* HERO GRADIENT */
  .hero-gradient {
    background: linear-gradient(180deg, rgba(59,130,246,0.3) 0%, rgba(10,10,10,0) 100%);
  }

  /* TRACK ROW */
  .track-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 12px; cursor: pointer; transition: background 0.15s; }

  /* CATEGORY BADGE */
  .cat-badge {
    display: flex; align-items: center; justify-content: center;

  }

const fmt = (s) => {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec < 10 ? '0' : ''}${sec}`;
};

const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

const fetchMusic = async (term, limit = 20) => {
  try {
    const t = term.replace(/[^\w\s\-]/g, ' ');
    const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(t)}&entity=song&limit=${limit}&_=${Math.random()}`);
    if (!r.ok) return [];
    const d = await r.json();
    return d.results.map(x => ({
      id: x.trackId,
      name: x.trackName,
      artist: x.artistName,
      album: x.collectionName,
      image: x.artworkUrl100?.replace('100x100bb', '600x600bb') || '',
      imageLg: x.artworkUrl100?.replace('100x100bb', '1000x1000bb') || '',
      previewUrl: x.previewUrl,
      duration: x.trackTimeMillis ? x.trackTimeMillis / 1000 : 30,
      trackViewUrl: x.trackViewUrl,
      genre: x.primaryGenreName,
    })).filter(x => x.previewUrl);
  } catch { return []; }
};

// ─── TOAST SYSTEM ─────────────────────────────────────────────────
function useToasts() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type = 'info') => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
  }, []);
  return { toasts, show };
}

// ─── FULL SCREEN PLAYER ───────────────────────────────────────────
const FullPlayer = ({ track, queue, queueIdx, isPlaying, progress, curTime, duration, volume, isLiked, shuffleOn, repeatMode, audioSource, ytVideoId, ytLoading, ytError, onClose, onToggle, onNext, onPrev, onSeek, onVolume, onLike, onShuffle, onRepeat, onMore, onSwitchSource, onArtist }) => {

  const [dragging, setDragging] = useState(false);
  const [dragPct, setDragPct] = useState(0);

  const handleProgressPointer = useCallback((e) => {
    if (!progressRef.current || duration <= 0) return;
    const rect = progressRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return pct;
  }, [duration]);

  const displayPct = dragging ? dragPct * 100 : progress;
  const displayTime = dragging ? dragPct * duration : curTime;

          <MoreHorizontal size={20} />
        </button>
      </div>

            Complet
          </button>
        </div>
      </div>

      {/* Album art / YouTube */}

        {audioSource === 'full' ? (
          <div className="w-full max-w-xs rounded-3xl overflow-hidden shadow-2xl bg-black border border-white/8" style={{ aspectRatio: '16/9' }}>
            {ytLoading && (

                <button onClick={() => onSwitchSource('apple')} className="mt-2 px-4 py-2 rounded-full bg-blue-600 text-white text-xs font-bold">

                allowFullScreen
              />
            )}
          </div>
        ) : (
          <div className={`w-full max-w-xs aspect-square rounded-3xl overflow-hidden shadow-2xl ${isPlaying ? 'album-playing' : 'album-paused'}`}
               style={{ boxShadow: '0 40px 80px -20px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.05)' }}>
            <img src={track.imageLg || track.image} alt="" className="w-full h-full object-cover" />
          </div>
        )}

        {/* Title + Like */}
        <div className="w-full max-w-xs mt-8 flex items-start justify-between">
          <div className="flex-1 min-w-0 pr-4">
            <h2 className="text-2xl font-bold text-white leading-tight line-clamp-2">{track.name}</h2>
            <button onClick={onArtist} className="text-[var(--text2)] text-sm mt-1 font-medium hover:text-white transition-colors">{track.artist}</button>
          </div>
          <button onClick={onLike} className="mt-1 p-1">
            <Heart size={26} className={isLiked ? 'text-blue-500 fill-blue-500' : 'text-[var(--text2)]'} />
          </button>
        </div>
      </div>

      {/* Controls */}
      <div className="relative z-10 px-6 pb-safe" style={{ paddingBottom: 'calc(env(safe-area-inset-bottom, 0px) + 32px)' }}>
        {/* Progress */}
        {audioSource === 'apple' ? (
          <div className="mb-5">
            <div
              ref={progressRef}
              className={`progress-track ${dragging ? 'dragging' : ''}`}
              style={{ height: 5 }}
              onPointerDown={e => {
                setDragging(true);
                const pct = handleProgressPointer(e);
                setDragPct(pct);
                progressRef.current.setPointerCapture(e.pointerId);
              }}
              onPointerMove={e => {
                if (!dragging) return;
                setDragPct(handleProgressPointer(e));
              }}
              onPointerUp={e => {
                if (!dragging) return;
                const pct = handleProgressPointer(e);
                onSeek(pct * duration);
                setDragging(false);
              }}
            >
              <div className="progress-fill" style={{ width: `${displayPct}%` }}>
                <div className="progress-thumb" />
              </div>
            </div>
            <div className="flex justify-between mt-2">
              <span className="text-[11px] font-mono text-[var(--text3)]">{fmt(displayTime)}</span>
              <span className="text-[11px] font-mono text-[var(--text3)]">{fmt(duration)}</span>
            </div>
          </div>
        ) : (
          <div className="mb-5 py-3 border-b border-white/8 flex items-center justify-between">
            <span className="text-[11px] text-[var(--text3)]">{ytLoading ? 'Recherche...' : ytVideoId ? 'YouTube HD' : ytError ? 'Indisponible' : ''}</span>
            <span className="text-[10px] font-bold uppercase tracking-wider text-[var(--text2)]">Lecture complète active</span>
            {ytVideoId && <span className="text-[10px] text-blue-500 font-bold">● LIVE</span>}
            {!ytVideoId && !ytLoading && <span className="w-16" />}
          </div>
        )}

        {/* Main controls */}
        <div className="flex items-center justify-between mb-6">
          <button onClick={onShuffle} className={`p-2 transition-all ${shuffleOn ? 'text-blue-500' : 'text-[var(--text2)]'}`}>
            <Shuffle size={22} />
          </button>
          <button onClick={onPrev} className={`p-2 text-white transition-transform active:scale-90 ${audioSource === 'full' ? 'opacity-30 pointer-events-none' : ''}`}>
            <SkipBack size={32} fill="white" />
          </button>
          <button onClick={onToggle} disabled={audioSource === 'full'} className={`w-16 h-16 rounded-full bg-white flex items-center justify-center shadow-xl transition-transform active:scale-90 ${audioSource === 'full' ? 'opacity-30' : ''}`}>
            {isPlaying ? <Pause size={28} fill="#0a0a0a" className="text-[#0a0a0a]" /> : <Play size={28} fill="#0a0a0a" className="text-[#0a0a0a] ml-1" />}
          </button>
          <button onClick={onNext} className={`p-2 text-white transition-transform active:scale-90 ${audioSource === 'full' ? 'opacity-30 pointer-events-none' : ''}`}>
            <SkipForward size={32} fill="white" />
          </button>
          <button onClick={onRepeat} className={`p-2 transition-all ${repeatMode !== 'none' ? 'text-blue-500' : 'text-[var(--text2)]'}`}>
            {repeatMode === 'one' ? <Repeat1 size={22} /> : <Repeat size={22} />}
          </button>
        </div>

        {/* Volume */}
        <div className="flex items-center gap-3">
          <VolumeX size={16} className="text-[var(--text3)] flex-shrink-0" />
          <input type="range" min="0" max="1" step="0.01" value={volume} onChange={e => onVolume(parseFloat(e.target.value))} className="flex-1" />
          <Volume2 size={16} className="text-[var(--text3)] flex-shrink-0" />
        </div>
      </div>
    </div>
  );
};

// ─── MAIN APP ──────────────────────────────────────────────────────
function App() {
  const [appState, setAppState] = useState('splash');
  const [accessKey, setAccessKey] = useState('');
  const [authLoading, setAuthLoading] = useState(false);
  const [user, setUser] = useState(null);
  const [userData, setUserData] = useState({ name: 'Utilisateur', photo: '', email: '' });

  // Audio state
  const audioRef = useRef(new Audio());
  const [track, setTrack] = useState(null);
  const [queue, setQueue] = useState([]);
  const [queueIdx, setQueueIdx] = useState(0);
  const [isPlaying, setIsPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [curTime, setCurTime] = useState(0);
  const [duration, setDuration] = useState(30);
  const [volume, setVolume] = useState(0.85);
  const [shuffleOn, setShuffleOn] = useState(false);
  const [repeatMode, setRepeatMode] = useState('none'); // none | all | one
  const [audioSource, setAudioSource] = useState('apple');
  const [ytVideoId, setYtVideoId] = useState(null);
  const [ytLoading, setYtLoading] = useState(false);
  const [ytError, setYtError] = useState(false);

  // UI state
  const [view, setView] = useState('home');
  const [playerOpen, setPlayerOpen] = useState(false);
  const [optionsTrack, setOptionsTrack] = useState(null);
  const [playlistModal, setPlaylistModal] = useState(false);
  const [logoutConfirm, setLogoutConfirm] = useState(false);
  const { toasts, show: toast } = useToasts();

  // Data
  const [liked, setLiked] = useState([]);
  const [playlists, setPlaylists] = useState([]);
  const [recentlyPlayed, setRecentlyPlayed] = useState([]);

  // Home
  const [homeRows, setHomeRows] = useState([]);
  const [loadedCats, setLoadedCats] = useState([]);
  const [catOffset, setCatOffset] = useState(0);
  const [homeLoading, setHomeLoading] = useState(false);
  const [reloadKey, setReloadKey] = useState(0);

  // Search
  const [searchQ, setSearchQ] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);

  // Artist
  const [artistName, setArtistName] = useState('');
  const [artistTracks, setArtistTracks] = useState([]);
  const [artistLoading, setArtistLoading] = useState(false);
  const [prevView, setPrevView] = useState('home');

  // ── Firebase Auth ───────────────────────────────────────────────
  useEffect(() => {
    const init = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch(e) { console.error(e); }
    };
    init();
    const unsub = onAuthStateChanged(auth, async u => {
      if (u) {
        setUser(u);
        const savedName = localStorage.getItem('lm_name') || 'Utilisateur';
        const savedPhoto = localStorage.getItem('lm_photo') || '';
        const savedEmail = localStorage.getItem('lm_email') || '';
        try {
          const snap = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid));
          if (snap.exists()) {
            const d = snap.data();
            const n = d.name || d.displayName || savedName;
            const p = d.photoURL || d.photo || savedPhoto;
            const e = d.email || savedEmail;
            setUserData({ name: n, photo: p, email: e });
            if (n) localStorage.setItem('lm_name', n);
            if (p) localStorage.setItem('lm_photo', p);
            if (e) localStorage.setItem('lm_email', e);
          } else {
            setUserData({ name: savedName, photo: savedPhoto, email: savedEmail });
          }
        } catch { setUserData({ name: savedName, photo: savedPhoto, email: savedEmail }); }
      }
    });
    return () => unsub();
  }, []);

  // ── Firestore listeners ─────────────────────────────────────────
  useEffect(() => {
    if (!user || appState !== 'main') return;
    const uid = user.uid;
    const unsubLikes = onSnapshot(doc(db, 'artifacts', appId, 'users', uid, 'likes', 'data'), s => {
      if (s.exists()) setLiked(s.data().tracks || []);
    }, () => {});
    const unsubPlay = onSnapshot(collection(db, 'artifacts', appId, 'users', uid, 'playlists'), s => {
      const p = [];
      s.forEach(d => p.push({ id: d.id, ...d.data() }));
      if (p.length) setPlaylists(p);
    }, () => {});
    const savedLikes = localStorage.getItem('lm_likes');
    if (savedLikes) setLiked(JSON.parse(savedLikes));
    return () => { unsubLikes(); unsubPlay(); };
  }, [user, appState]);

  // ── Splash timer ────────────────────────────────────────────────
  useEffect(() => {
    const t = setTimeout(() => {
      setAppState(localStorage.getItem('lm_key') ? 'main' : 'login');
    }, 2200);
    return () => clearTimeout(t);
  }, []);

  // ── Login ───────────────────────────────────────────────────────
  const handleLogin = () => {
    if (!accessKey.trim()) return;
    setAuthLoading(true);
    setTimeout(() => {
      localStorage.setItem('lm_key', accessKey);
      setAppState('main');
      setAuthLoading(false);
    }, 900);
  };

  const handleLogout = () => {
    localStorage.removeItem('lm_key');
    audioRef.current.pause();
    setTrack(null);
    setIsPlaying(false);
    setLogoutConfirm(false);
    setAppState('login');
  };

  // ── Load home categories ────────────────────────────────────────
  useEffect(() => {
    if (appState !== 'main') return;
    setHomeRows([]);
    setLoadedCats(shuffle(CATEGORIES));
    setCatOffset(0);
  }, [appState, reloadKey]);

  useEffect(() => {
    if (!loadedCats.length || homeLoading) return;
    const toLoad = loadedCats.slice(catOffset, catOffset + 5);
    if (!toLoad.length) return;
    let mounted = true;
    setHomeLoading(true);
    (async () => {
      const results = [];
      for (const cat of toLoad) {
        if (!mounted) break;
        const data = await fetchMusic(cat.term, 20);
        if (data.length) results.push({ ...cat, data });
        await new Promise(r => setTimeout(r, 300));
      }
      if (mounted) {
        setHomeRows(prev => {
          const existing = new Set(prev.map(r => r.id));
          return [...prev, ...results.filter(r => !existing.has(r.id))];
        });
        setHomeLoading(false);
      }
    })();
    return () => { mounted = false; };
  }, [catOffset, loadedCats]);

  const loadMoreHome = () => {
    if (!homeLoading && catOffset + 5 < loadedCats.length) {
      setCatOffset(prev => prev + 5);
    }
  };

  const handleHomeScroll = e => {
    const el = e.currentTarget;
    if (el.scrollHeight - el.scrollTop - el.clientHeight < 500) loadMoreHome();
  };

  // ── Search ──────────────────────────────────────────────────────
  useEffect(() => {
    if (!searchQ.trim()) { setSearchResults([]); return; }
    const t = setTimeout(async () => {
      setSearching(true);
      const res = await fetchMusic(searchQ, 50);
      setSearchResults(res);
      setSearching(false);
    }, 600);
    return () => clearTimeout(t);
  }, [searchQ]);

  // ── Audio engine ────────────────────────────────────────────────
  const playTrack = useCallback((t, q = null, idx = 0) => {
    setTrack(t);
    const newQ = q || [t];
    setQueue(newQ);
    setQueueIdx(idx);
    if (audioSource === 'apple' && t.previewUrl) {
      audioRef.current.src = t.previewUrl;
      audioRef.current.volume = volume;
      audioRef.current.play().catch(() => {});
    }
    setIsPlaying(true);
    setRecentlyPlayed(prev => {
      const filtered = prev.filter(x => x.id !== t.id);
      return [t, ...filtered].slice(0, 30);
    });
  }, [audioSource, volume]);

  const togglePlay = useCallback((e) => {
    if (e) e.stopPropagation();
    if (audioSource === 'full') { setIsPlaying(p => !p); return; }
    if (isPlaying) audioRef.current.pause();
    else audioRef.current.play().catch(() => {});
    setIsPlaying(p => !p);
  }, [isPlaying, audioSource]);

  const playNext = useCallback((e) => {
    if (e) e.stopPropagation();
    if (!queue.length) return;
    let nextIdx;
    if (shuffleOn) {
      nextIdx = Math.floor(Math.random() * queue.length);
    } else {
      nextIdx = (queueIdx + 1) % queue.length;
    }
    playTrack(queue[nextIdx], queue, nextIdx);
  }, [queue, queueIdx, shuffleOn, playTrack]);

  const playPrev = useCallback(() => {
    if (audioSource === 'apple' && audioRef.current.currentTime > 3) {
      audioRef.current.currentTime = 0; return;
    }
    if (!queue.length) return;
    const prevIdx = (queueIdx - 1 + queue.length) % queue.length;
    playTrack(queue[prevIdx], queue, prevIdx);
  }, [queue, queueIdx, audioSource, playTrack]);

  const handleSeek = useCallback((time) => {
    if (audioSource === 'full') return;
    audioRef.current.currentTime = time;
    setCurTime(time);
    if (duration > 0) setProgress((time / duration) * 100);
  }, [audioSource, duration]);

  const switchSource = useCallback((src) => {
    setAudioSource(src);
    if (src === 'full') {
      audioRef.current.pause();
    } else if (track && isPlaying && track.previewUrl) {
      audioRef.current.src = track.previewUrl;
      audioRef.current.play().catch(() => {});
    }
  }, [track, isPlaying]);

  // ── Fetch YouTube video ID when full mode is active ─────────────
  useEffect(() => {
    if (audioSource !== 'full' || !track) return;
    let cancelled = false;
    setYtVideoId(null);
    setYtError(false);
    setYtLoading(true);
    fetchYouTubeVideoId(track.name, track.artist).then(id => {
      if (cancelled) return;
      setYtVideoId(id || null);
      setYtError(!id);
      setYtLoading(false);
    });
    return () => { cancelled = true; };
  }, [audioSource, track?.id]);

  useEffect(() => {
    const audio = audioRef.current;
    const onTime = () => {
      setCurTime(audio.currentTime);
      if (audio.duration) {
        setDuration(audio.duration);
        setProgress((audio.currentTime / audio.duration) * 100);
      }
    };
    const onEnd = () => {
      if (repeatMode === 'one') {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } else {
        setIsPlaying(false);
        playNext();
      }
    };
    audio.addEventListener('timeupdate', onTime);
    audio.addEventListener('ended', onEnd);
    return () => { audio.removeEventListener('timeupdate', onTime); audio.removeEventListener('ended', onEnd); };
  }, [playNext, repeatMode]);

  useEffect(() => { audioRef.current.volume = volume; }, [volume]);

  // ── Likes ───────────────────────────────────────────────────────
  const isLiked = useCallback((id) => liked.some(x => x.id === id), [liked]);
  const toggleLike = useCallback(async (t, e) => {
    if (e) e.stopPropagation();
    const already = liked.some(x => x.id === t.id);
    const newLiked = already ? liked.filter(x => x.id !== t.id) : [t, ...liked];
    setLiked(newLiked);
    localStorage.setItem('lm_likes', JSON.stringify(newLiked));
    toast(already ? 'Retiré des favoris' : 'Ajouté aux favoris ❤️');
    if (user) {
      try { await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'likes', 'data'), { tracks: newLiked }, { merge: true }); } catch {}
    }
  }, [liked, user, toast]);

  // ── Playlists ───────────────────────────────────────────────────
  const createPlaylist = async (name) => {
    if (!name.trim() || !user) return;
    const newPl = { id: Date.now().toString(), name, createdAt: Date.now(), tracks: [] };
    try {
      await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'playlists', newPl.id), newPl);
      toast('Playlist créée !');
    } catch { toast('Erreur création playlist', 'error'); }
    setPlaylistModal(false);
  };

  // ── Artist page ─────────────────────────────────────────────────
  const openArtist = useCallback(async (t) => {
    setPrevView(view);
    setArtistName(t.artist || t.name);
    setView('artist');
    setArtistLoading(true);
    setPlayerOpen(false);
    setOptionsTrack(null);
    const results = await fetchMusic(t.artist || t.name, 50);
    setArtistTracks(results);
    setArtistLoading(false);
    window.scrollTo && window.scrollTo(0, 0);
  }, [view]);

  // ── Share ───────────────────────────────────────────────────────
  const shareTrack = (t) => {
    const url = t.trackViewUrl || `https://music.apple.com/search?term=${encodeURIComponent(t.name)}`;
    if (navigator.share) {
      navigator.share({ title: t.name, text: `Écoute "${t.name}" sur LevelMusic !`, url }).catch(() => {});
    } else {
      navigator.clipboard?.writeText(url);
      toast('Lien copié !');
    }
  };

  // ── Queue add ───────────────────────────────────────────────────
  const addToQueue = (t) => {
    setQueue(prev => {
      const newQ = [...prev];
      newQ.splice(queueIdx + 1, 0, t);
      return newQ;
    });
    toast('Ajouté à la file d\'attente');
  };

  // ── Long press ─────────────────────────────────────────────────
  const lpTimer = useRef(null);
  let lpFired = false;
  const onPtrDown = (t) => {
    lpFired = false;
    lpTimer.current = setTimeout(() => { lpFired = true; setOptionsTrack(t); }, 450);
  };
  const onPtrUp = (t, cb) => {
    clearTimeout(lpTimer.current);
    if (!lpFired) cb();
  };
  const onPtrMove = () => clearTimeout(lpTimer.current);

  // ── Avatar ─────────────────────────────────────────────────────
  const Avatar = ({ size = 32, textSize = 14 }) => {
    const init = (userData.name || 'U').charAt(0).toUpperCase();
    if (userData.photo) return <img src={userData.photo} alt="" style={{ width: size, height: size }} className="rounded-full object-cover border border-white/10" />;
    return (
      <div className="rounded-full bg-blue-600 flex items-center justify-center border border-blue-500/40" style={{ width: size, height: size, fontSize: textSize, fontWeight: 700, color: 'white' }}>
        {init}
      </div>
    );
  };

  // ──────────────────────────────────────────────────────────────
  // RENDER: SPLASH
  // ──────────────────────────────────────────────────────────────
  if (appState === 'splash') {
    return (
      <div className="fixed inset-0 flex items-center justify-center" style={{ background: '#0a0a0a' }}>
        <div className="splash-anim flex flex-col items-center gap-6">
          <div className="relative w-20 h-20 flex items-center justify-center">
            <svg className="absolute inset-0 spin-ring" viewBox="0 0 100 100" fill="none">
              <circle cx="50" cy="50" r="46" stroke="url(#g1)" strokeWidth="1.5" strokeDasharray="72 28" strokeLinecap="round" />
              <defs>
                <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#60a5fa" />
                  <stop offset="100%" stopColor="#1d4ed8" />
                </linearGradient>
              </defs>
            </svg>
            <CustomLogo className="w-9 h-9 text-blue-500" />
          </div>
          <WordMark size="text-3xl" />
        </div>
      </div>
    );
  }

  // ──────────────────────────────────────────────────────────────
  // RENDER: LOGIN
  // ──────────────────────────────────────────────────────────────
  if (appState === 'login') {
    return (
      <div className="fixed inset-0 flex items-center justify-center px-5 scroll-y" style={{ background: '#0a0a0a' }}>
        <div className="w-full max-w-sm fade-in">
          <div className="flex flex-col items-center mb-10">
            <div className="relative w-16 h-16 flex items-center justify-center mb-5">
              <div className="absolute inset-0 rounded-full bg-blue-600/20 border border-blue-500/30" />
              <CustomLogo className="w-8 h-8 text-blue-500" />
            </div>
            <WordMark size="text-3xl" />
            <p className="text-[var(--text2)] text-sm mt-2 text-center">Votre musique, partout.</p>
          </div>

          <div className="rounded-3xl p-8 border border-white/8" style={{ background: '#111' }}>
            <p className="text-[10px] font-bold uppercase tracking-[0.2em] text-[var(--text3)] mb-2">Clé d'accès</p>
            <input
              type="text"
              value={accessKey}
              onChange={e => setAccessKey(e.target.value.toUpperCase().replace(/[^A-Z0-9\-]/g, '').substring(0, 16))}
              onKeyDown={e => e.key === 'Enter' && handleLogin()}
              className="w-full bg-black/60 border border-white/10 rounded-2xl px-4 py-4 text-center text-white font-mono tracking-widest text-base outline-none focus:border-blue-500 transition-colors placeholder:text-[var(--text3)] mb-5"
              placeholder="LVL-XXXXX-XXXXX"
            />
            <button
              onClick={handleLogin}
              disabled={authLoading}
              className="w-full py-4 rounded-full bg-blue-600 text-white font-bold text-sm hover:bg-blue-500 transition-colors disabled:opacity-50"
              style={{ boxShadow: '0 0 24px rgba(59,130,246,0.35)' }}
            >
              {authLoading ? 'Connexion...' : 'Accéder à LevelMusic'}
            </button>
          </div>

          <div className="mt-6 flex justify-center">
            <a href="https://ecosystem-of-levelup.vercel.app/" target="_blank" rel="noreferrer"
               className="flex items-center gap-2 text-xs font-semibold text-[var(--text2)] hover:text-white transition-colors border border-white/10 px-5 py-3 rounded-full hover:border-blue-500/50">
              <Network size={14} className="text-blue-500" />
              Rejoindre l'Écosystème Level
            </a>
          </div>
        </div>
      </div>
    );
  }

  // ──────────────────────────────────────────────────────────────
  // RENDER: MAIN APP
  // ──────────────────────────────────────────────────────────────
  const bottomPad = track ? `calc(var(--nav-h) + var(--safe-bottom) + var(--mini-h) + 20px)` : `calc(var(--nav-h) + var(--safe-bottom) + 12px)`;

  return (
    <div className="fixed inset-0 flex flex-col" style={{ background: 'var(--bg)' }}>

      {/* ── Toasts ── */}
      <div className="fixed top-16 right-4 z-[1000] flex flex-col gap-2 pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className="toast-anim glass-dark border border-white/10 text-white px-4 py-3 rounded-2xl shadow-2xl text-sm font-semibold max-w-xs">
            {t.msg}
          </div>
        ))}
      </div>

      {/* ── Modals ── */}
      {playlistModal && <PlaylistModal onClose={() => setPlaylistModal(false)} onCreate={createPlaylist} />}

      {logoutConfirm && (
        <div className="fixed inset-0 z-[700] flex items-center justify-center p-6" style={{ background: 'rgba(0,0,0,0.85)' }}>
          <div className="w-full max-w-sm rounded-3xl p-8 fade-in" style={{ background: '#1c1c1e' }}>
            <h3 className="text-xl font-bold text-white mb-2">Déconnexion</h3>
            <p className="text-[var(--text2)] text-sm mb-8">Êtes-vous sûr de vouloir quitter votre session LevelMusic ?</p>
            <div className="flex gap-3">
              <button onClick={() => setLogoutConfirm(false)} className="flex-1 py-3.5 rounded-2xl bg-white/8 text-white font-semibold text-sm hover:bg-white/12 transition-colors">Annuler</button>
              <button onClick={handleLogout} className="flex-1 py-3.5 rounded-2xl bg-red-600 text-white font-bold text-sm hover:bg-red-500 transition-colors">Déconnexion</button>
            </div>
          </div>
        </div>
      )}

      {optionsTrack && (
        <OptionsSheet
          track={optionsTrack}
          isLiked={isLiked(optionsTrack.id)}
          onClose={() => setOptionsTrack(null)}
          onLike={() => toggleLike(optionsTrack)}
          onQueue={() => { addToQueue(optionsTrack); toast("Ajouté à la file"); }}
          onArtist={() => openArtist(optionsTrack)}
          onShare={() => shareTrack(optionsTrack)}
          onPlaylistAdd={() => { setPlaylistModal(true); toast("Crée d'abord une playlist !"); }}
        />
      )}

      {/* ── Full Screen Player ── */}
      {playerOpen && track && (
        <FullPlayer
          track={track} queue={queue} queueIdx={queueIdx}
          isPlaying={isPlaying} progress={progress} curTime={curTime} duration={duration}
          volume={volume} isLiked={isLiked(track.id)}
          shuffleOn={shuffleOn} repeatMode={repeatMode} audioSource={audioSource}
          ytVideoId={ytVideoId} ytLoading={ytLoading} ytError={ytError}
          onClose={() => setPlayerOpen(false)}
          onToggle={togglePlay} onNext={playNext} onPrev={playPrev}
          onSeek={handleSeek} onVolume={setVolume}
          onLike={() => toggleLike(track)}
          onShuffle={() => setShuffleOn(p => !p)}
          onRepeat={() => setRepeatMode(m => m === 'none' ? 'all' : m === 'all' ? 'one' : 'none')}
          onMore={() => { setOptionsTrack(track); }}
          onSwitchSource={switchSource}
          onArtist={() => openArtist(track)}
        />
      )}

      {/* ── HEADER ── */}
      <header className="flex-shrink-0 flex items-center justify-between px-5 pt-12 pb-4 z-[100]"
              style={{ background: 'linear-gradient(180deg, rgba(10,10,10,1) 0%, rgba(10,10,10,0) 100%)' }}>
        <div className="flex items-center gap-2 cursor-pointer" onClick={() => { setView('home'); }}>
          <CustomLogo className="w-7 h-7 text-blue-500" />
          <WordMark size="text-lg" />
        </div>
        <button onClick={() => setView('profile')} className="rounded-full overflow-hidden">
          <Avatar size={34} textSize={14} />
        </button>
      </header>

      {/* ── MAIN CONTENT ── */}
      <main className="flex-1 overflow-hidden relative">

        {/* ══ HOME ══ */}
        {view === 'home' && (
          <div className="h-full scroll-y fade-in" onScroll={handleHomeScroll} style={{ paddingBottom: bottomPad }}>
            <div className="px-5 pb-4">
              <h1 className="text-3xl font-black text-white mb-1">
                {(() => {
                  const h = new Date().getHours();
                  if (h < 12) return 'Bonjour 👋';
                  if (h < 18) return 'Bon après-midi';
                  return 'Bonsoir 🌙';
                })()}
              </h1>
              <p className="text-[var(--text2)] text-sm">Qu'est-ce qu'on écoute aujourd'hui ?</p>
            </div>

            {/* Recently played */}
            {recentlyPlayed.length > 0 && (
              <div className="mb-8">
                <div className="flex items-center justify-between px-5 mb-4">
                  <h2 className="text-lg font-bold text-white">Écoutés récemment</h2>
                </div>
                <div className="grid grid-cols-2 gap-3 px-5">
                  {recentlyPlayed.slice(0, 6).map((t, idx) => (
                    <div key={t.id + idx} onClick={() => playTrack(t, recentlyPlayed, idx)}
                         className="flex items-center gap-3 rounded-xl cursor-pointer card-hover group"
                         style={{ background: '#1c1c1e' }}>
                      <img src={t.image} alt="" className="w-14 h-14 rounded-l-xl object-cover flex-shrink-0" />
                      <div className="flex-1 min-w-0 py-2 pr-2">
                        <p className={`text-xs font-bold truncate ${track?.id === t.id ? 'text-blue-400' : 'text-white'}`}>{t.name}</p>
                        <p className="text-[10px] text-[var(--text2)] truncate mt-0.5">{t.artist}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Category rows */}
            {homeRows.length === 0 && !homeLoading && (
              <div className="flex flex-col items-center justify-center py-24 gap-4">
                <Spinner size={36} />
                <p className="text-[var(--text3)] text-xs font-semibold uppercase tracking-widest">Chargement du catalogue...</p>
              </div>
            )}

            {homeRows.map(row => (
              <div key={row.id} className="mb-8">
                <div className="flex items-center justify-between px-5 mb-4">
                  <h2 className="text-lg font-bold text-white">{row.title}</h2>
                  <button onClick={() => { setSearchQ(row.term); setView('search'); }} className="text-xs font-semibold text-blue-500">Voir tout</button>
                </div>
                <div className="scroll-x gap-4 px-5">
                  {row.data.map((t, idx) => (
                    <div key={t.id} onPointerDown={() => onPtrDown(t)} onPointerUp={() => onPtrUp(t, () => playTrack(t, row.data, idx))} onPointerMove={onPtrMove} onPointerCancel={onPtrMove} onContextMenu={e => e.preventDefault()}>
                      <AlbumCard track={t} size={148} isCurrent={track?.id === t.id} isPlaying={isPlaying && track?.id === t.id} onPlay={() => {}} onMore={() => setOptionsTrack(t)} />
                    </div>
                  ))}
                </div>
              </div>
            ))}

            {homeLoading && (
              <div className="flex justify-center py-8"><Spinner /></div>
            )}
          </div>
        )}

        {/* ══ SEARCH ══ */}
        {view === 'search' && (
          <div className="h-full flex flex-col fade-in">
            <div className="px-5 pb-4 flex-shrink-0">
              <h1 className="text-3xl font-black text-white mb-4">Recherche</h1>
              <div className="relative">
                <Search size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-[var(--text3)]" />
                <input
                  autoFocus
                  value={searchQ}
                  onChange={e => setSearchQ(e.target.value)}
                  className="w-full rounded-xl pl-10 pr-4 py-3.5 text-sm text-white outline-none transition-colors border border-white/8 focus:border-blue-500/50"
                  style={{ background: '#1c1c1e' }}
                  placeholder="Artistes, titres, albums..."
                />
                {searchQ && (
                  <button onClick={() => setSearchQ('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-[var(--text3)] hover:text-white transition-colors">
                    <X size={16} />
                  </button>
                )}
              </div>
            </div>

            {!searchQ && (
              <div className="flex-1 scroll-y px-5 pb-8" style={{ paddingBottom: bottomPad }}>
                <p className="text-sm font-bold text-[var(--text2)] mb-4 uppercase tracking-wider">Parcourir par genre</p>
                <div className="grid grid-cols-2 gap-3">
                  {CATEGORIES.map(cat => (
                    <button key={cat.id} onClick={() => setSearchQ(cat.term)} className="relative rounded-2xl overflow-hidden flex items-center justify-center font-bold text-white text-sm py-6 text-center transition-transform active:scale-95"
                            style={{ background: cat.color, minHeight: 80 }}>
                      {cat.title}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {searchQ && (
              <div className="flex-1 scroll-y" style={{ paddingBottom: bottomPad }}>
                {searching ? (
                  <div className="flex justify-center py-16"><Spinner size={36} /></div>
                ) : searchResults.length > 0 ? (
                  <div className="py-2">
                    <p className="text-xs text-[var(--text3)] font-semibold px-5 mb-3">{searchResults.length} résultats pour « {searchQ} »</p>
                    {searchResults.map((t, idx) => (
                      <div key={t.id} onPointerDown={() => onPtrDown(t)} onPointerUp={() => onPtrUp(t, () => playTrack(t, searchResults, idx))} onPointerMove={onPtrMove} onPointerCancel={onPtrMove} onContextMenu={e => e.preventDefault()}>
                        <TrackRow track={t} idx={idx} isPlaying={isPlaying} isCurrent={track?.id === t.id} onPlay={() => {}} onMore={() => setOptionsTrack(t)} />
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="flex flex-col items-center py-24 gap-3">
                    <Music size={48} className="text-[var(--text3)]" />
                    <p className="text-[var(--text2)] font-semibold">Aucun résultat trouvé</p>
                    <p className="text-[var(--text3)] text-sm">Essayez un autre terme</p>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ══ LIBRARY ══ */}
        {view === 'library' && (
          <div className="h-full scroll-y fade-in px-5" style={{ paddingBottom: bottomPad }}>
            <h1 className="text-3xl font-black text-white mb-6">Ma Bibliothèque</h1>

            {/* Liked tracks */}
            <div className="mb-8">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-bold text-white flex items-center gap-2">
                  <Heart size={18} className="text-blue-500 fill-blue-500" /> Favoris
                  <span className="text-sm font-normal text-[var(--text2)] ml-1">({liked.length})</span>
                </h2>
              </div>
              {liked.length === 0 ? (
                <div className="rounded-2xl border border-white/8 p-8 text-center" style={{ background: '#111' }}>
                  <Heart size={32} className="text-[var(--text3)] mx-auto mb-3" />
                  <p className="text-[var(--text2)] text-sm">Aucun favori pour l'instant</p>
                  <p className="text-[var(--text3)] text-xs mt-1">Appuyez sur ♥ pour ajouter des titres</p>
                </div>
              ) : (
                <div>
                  {liked.map((t, idx) => (
                    <div key={t.id} onPointerDown={() => onPtrDown(t)} onPointerUp={() => onPtrUp(t, () => playTrack(t, liked, idx))} onPointerMove={onPtrMove} onPointerCancel={onPtrMove} onContextMenu={e => e.preventDefault()}>
                      <TrackRow track={t} idx={idx} isPlaying={isPlaying} isCurrent={track?.id === t.id} onPlay={() => {}} onMore={() => setOptionsTrack(t)} />
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Playlists */}
            <div className="mb-8">
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-lg font-bold text-white flex items-center gap-2">
                  <ListMusic size={18} className="text-blue-500" /> Playlists
                </h2>
                <button onClick={() => setPlaylistModal(true)} className="flex items-center gap-1.5 text-sm font-semibold text-blue-500 hover:text-blue-400 transition-colors">
                  <Plus size={16} /> Créer
                </button>
              </div>
              {playlists.length === 0 ? (
                <button onClick={() => setPlaylistModal(true)}
                        className="w-full rounded-2xl border border-dashed border-white/15 p-8 text-center flex flex-col items-center gap-3 hover:border-blue-500/40 transition-colors">
                  <Plus size={28} className="text-[var(--text3)]" />
                  <p className="text-[var(--text2)] text-sm font-semibold">Créer une playlist</p>
                </button>
              ) : (
                <div className="space-y-3">
                  {playlists.map(pl => (
                    <div key={pl.id} className="flex items-center gap-4 p-4 rounded-2xl cursor-pointer card-hover" style={{ background: '#111' }}>
                      <div className="w-14 h-14 rounded-xl bg-blue-600/20 flex items-center justify-center flex-shrink-0">
                        <ListMusic size={22} className="text-blue-500" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="font-bold text-white text-sm truncate">{pl.name}</p>
                        <p className="text-[var(--text2)] text-xs mt-0.5">{(pl.tracks || []).length} titre{(pl.tracks || []).length !== 1 ? 's' : ''}</p>
                      </div>
                      <ChevronRight size={18} className="text-[var(--text3)] flex-shrink-0" />
                    </div>
                  ))}
                  <button onClick={() => setPlaylistModal(true)}
                          className="w-full flex items-center gap-4 p-4 rounded-2xl cursor-pointer border border-dashed border-white/10 hover:border-blue-500/30 transition-colors">
                    <div className="w-14 h-14 rounded-xl border border-dashed border-white/15 flex items-center justify-center flex-shrink-0">
                      <Plus size={22} className="text-[var(--text3)]" />
                    </div>
                    <span className="text-[var(--text2)] text-sm font-semibold">Nouvelle playlist</span>
                  </button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ══ ARTIST ══ */}
        {view === 'artist' && (
          <div className="h-full scroll-y fade-in" style={{ paddingBottom: bottomPad }}>
            <div className="flex items-center gap-4 px-5 mb-6">
              <button onClick={() => setView(prevView)} className="w-10 h-10 rounded-full flex items-center justify-center text-white" style={{ background: '#1c1c1e' }}>
                <ArrowLeft size={20} />
              </button>
              <h2 className="text-xl font-black text-white truncate flex-1">{artistName}</h2>
            </div>

            {/* Artist header */}
            <div className="px-5 mb-6">
              <div className="relative rounded-3xl overflow-hidden" style={{ height: 180 }}>
                {artistTracks[0] && <img src={artistTracks[0].image} alt="" className="w-full h-full object-cover" />}
                <div className="absolute inset-0" style={{ background: 'linear-gradient(180deg, rgba(10,10,10,0.2) 0%, rgba(10,10,10,0.95) 100%)' }} />
                <div className="absolute bottom-0 left-0 right-0 p-5">
                  <h2 className="text-2xl font-black text-white">{artistName}</h2>
                  {artistTracks.length > 0 && (
                    <button onClick={() => playTrack(artistTracks[0], artistTracks, 0)}
                            className="mt-3 flex items-center gap-2 px-5 py-2.5 rounded-full bg-blue-600 text-white text-sm font-bold">
                      <Play size={14} fill="white" /> Écouter
                    </button>
                  )}
                </div>
              </div>
            </div>

            {artistLoading ? (
              <div className="flex justify-center py-16"><Spinner size={36} /></div>
            ) : (
              <div>
                <p className="px-5 text-xs font-bold uppercase tracking-wider text-[var(--text2)] mb-3">Titres populaires</p>
                {artistTracks.map((t, idx) => (
                  <div key={t.id} onPointerDown={() => onPtrDown(t)} onPointerUp={() => onPtrUp(t, () => playTrack(t, artistTracks, idx))} onPointerMove={onPtrMove} onPointerCancel={onPtrMove} onContextMenu={e => e.preventDefault()}>
                    <TrackRow track={t} idx={idx} isPlaying={isPlaying} isCurrent={track?.id === t.id} onPlay={() => {}} onMore={() => setOptionsTrack(t)} />
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ══ PROFILE ══ */}
        {view === 'profile' && (
          <div className="h-full scroll-y fade-in px-5" style={{ paddingBottom: bottomPad }}>
            <h1 className="text-3xl font-black text-white mb-8">Profil</h1>

            <div className="flex items-center gap-5 mb-8 p-5 rounded-3xl border border-white/8" style={{ background: '#111' }}>
              <Avatar size={64} textSize={28} />
              <div className="min-w-0">
                <h2 className="text-xl font-bold text-white truncate">{userData.name}</h2>
                {userData.email ? (
                  <p className="text-[var(--text2)] text-xs font-mono mt-1 truncate">{userData.email}</p>
                ) : (
                  <p className="text-red-400 text-xs mt-1 font-semibold">Email non renseigné</p>
                )}
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-3 gap-3 mb-8">
              {[
                { label: 'Favoris', value: liked.length, icon: <Heart size={18} className="text-blue-500" /> },
                { label: 'Playlists', value: playlists.length, icon: <ListMusic size={18} className="text-blue-500" /> },
                { label: 'Récents', value: recentlyPlayed.length, icon: <Clock size={18} className="text-blue-500" /> },
              ].map(stat => (
                <div key={stat.label} className="flex flex-col items-center gap-2 py-5 rounded-2xl border border-white/8" style={{ background: '#111' }}>
                  {stat.icon}
                  <span className="text-2xl font-black text-white">{stat.value}</span>
                  <span className="text-[10px] text-[var(--text2)] font-semibold uppercase tracking-wide">{stat.label}</span>
                </div>
              ))}
            </div>

            {/* Settings */}
            <div className="rounded-3xl border border-white/8 overflow-hidden mb-8" style={{ background: '#111' }}>
              <button onClick={() => setPlaylistModal(true)} className="w-full flex items-center gap-4 px-5 py-4 hover:bg-white/5 transition-colors border-b border-white/8">
                <Plus size={20} className="text-blue-500" />
                <span className="text-white font-medium">Créer une playlist</span>
                <ChevronRight size={16} className="text-[var(--text3)] ml-auto" />
              </button>
              <button onClick={() => setView('library')} className="w-full flex items-center gap-4 px-5 py-4 hover:bg-white/5 transition-colors">
                <Library size={20} className="text-blue-500" />
                <span className="text-white font-medium">Ma bibliothèque</span>
                <ChevronRight size={16} className="text-[var(--text3)] ml-auto" />
              </button>
            </div>

            <button onClick={() => setLogoutConfirm(true)}
                    className="w-full py-4 rounded-2xl text-red-500 font-bold text-sm border border-red-500/20 hover:bg-red-500/10 transition-colors">
              Se déconnecter
            </button>
          </div>
        )}
      </main>

      {/* ── Mini Player ── */}
      {track && !playerOpen && (
        <MiniPlayer
          track={track} isPlaying={isPlaying} progress={progress}
          isLiked={isLiked(track.id)}
          onExpand={() => setPlayerOpen(true)}
          onToggle={togglePlay}
          onNext={playNext}
          onLike={e => toggleLike(track, e)}
        />
      )}

      {/* ── Nav Bar ── */}
      <nav className="nav-bar">
        {[
          { id: 'home', icon: Home, label: 'Accueil' },
          { id: 'search', icon: Search, label: 'Recherche' },
          { id: 'library', icon: Library, label: 'Bibliothèque' },
          { id: 'profile', icon: User, label: 'Profil' },
        ].map(tab => {
          const Icon = tab.icon;
          const active = view === tab.id;
          return (
            <button key={tab.id} onClick={() => setView(tab.id)}
                    className="flex flex-col items-center gap-1 px-4 py-1 outline-none transition-colors"
                    style={{ color: active ? 'var(--accent)' : 'var(--text3)' }}>
              <Icon size={24} strokeWidth={active ? 2.5 : 1.8} />
              <span style={{ fontSize: 10, fontWeight: active ? 700 : 500, letterSpacing: '0.03em' }}>{tab.label}</span>
            </button>
          );
        })}
      </nav>

      <style>{`
        @keyframes eq {
          0%, 100% { transform: scaleY(0.5); }
          50% { transform: scaleY(1); }
        }
        .bg-white\\/8 { background: rgba(255,255,255,0.08); }
